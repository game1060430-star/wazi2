<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wazi 早餐店管理系統 V21.9</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: "Microsoft JhengHei", sans-serif; }
        body { background: #f4f7f6; margin: 0; padding: 10px; color: #333; font-size: 14px; }
        .container { max-width: 850px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .tabs { display: grid; grid-template-columns: repeat(3, 2fr); gap: 8px; margin-bottom: 12px; }
        .tab-btn { padding: 12px 5px; background: #e0e0e0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .tab-btn.active { background: #764ba2; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 11px; color: #777; margin-bottom: 4px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; }
        .calc-hint { font-size: 11px; color: #d9534f; margin-top: 2px; font-weight: bold; text-align: right; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-success { background: #28a745; color: white; }
        .btn-primary { background: #007bff; color: white; }
        .btn-danger { background: #dc3545; color: white; padding: 10px; font-size: 14px; border-radius: 8px; border:none; margin-top:10px; color:white; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        table th, table td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .section-title { border-left: 4px solid #764ba2; padding-left: 8px; margin: 15px 0 10px; font-size: 15px; font-weight: bold; background: #f9f0ff; padding: 5px; }
        .v-row { display: flex; align-items: center; justify-content: space-between; padding: 8px; background: #fff; border: 1px solid #eee; border-radius: 8px; margin-bottom: 5px; }
        .v-row b { font-size: 12px; flex: 1; }
        .v-row input { width: 70px; padding: 8px; border: 1px solid #ccc; border-radius: 6px; text-align: center; font-size: 16px; }
        #repArea { background: white; padding: 15px; border-radius: 8px; }
        .total-row { background: #fcf8e3; font-weight: bold; }
        .profit-box { font-size: 20px; font-weight: bold; text-align: center; padding: 15px; background: #333; color: #fff; border-radius: 8px; margin-top: 10px; }
        
        /* 對帳中心勾選樣式 */
        .vendor-item { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; }
        .vendor-item input { margin-right: 8px; transform: scale(1.2); }
    </style>
</head>
<body onload="initApp()">
<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('daily')">每日記帳</button>
        <button class="tab-btn" onclick="switchTab('recon')">對帳中心</button>
        <button class="tab-btn" onclick="switchTab('report')">報表中心</button>
        <button class="tab-btn" onclick="switchTab('monthly')">月結算</button>
        <button class="tab-btn" onclick="switchTab('settings')">系統設定</button>
        <button class="tab-btn" onclick="switchTab('data')">資料管理</button>
    </div>

    <div id="daily" class="tab-content active">
        <div class="card"><input type="date" id="logDate" onchange="loadDaily()" style="width:100%; border:none; font-size:18px; font-weight:bold; text-align:center;"></div>
        <div class="card">
            <h4 style="margin:0 0 10px;">💰 今日收銀</h4>
            <div class="grid">
                <div class="form-group"><label>千元</label><input type="number" id="c1000" oninput="calcDaily()"></div>
                <div class="form-group"><label>百元</label><input type="number" id="c100" oninput="calcDaily()"></div>
            </div>
            <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
                <div class="form-group"><label>$50重</label><input type="number" id="w50" oninput="calcDaily()"></div>
                <div class="form-group"><label>$10重</label><input type="number" id="w10" oninput="calcDaily()"></div>
                <div class="form-group"><label>$5重</label><input type="number" id="w5" oninput="calcDaily()"></div>
            </div>
            <div class="grid">
                <div class="form-group"><label>網路收入</label><input type="number" id="pOnline" oninput="calcDaily()"></div>
                <div class="form-group"><label>掃碼支付</label><input type="number" id="pScan" oninput="calcDaily()"></div>
            </div>
            <div style="text-align:right; font-size:15px; font-weight:bold; color:#764ba2;">今日營業額: <span id="cSumDisplay">$0</span></div>
        </div>
        <h4 class="section-title">📦 廠商進貨</h4>
        <div id="vDailyArea" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;"></div>
        <button class="btn btn-success" style="margin-top:15px;" onclick="saveDaily()">✅ 儲存今日數據</button>
    </div>

    <div id="recon" class="tab-content">
        <div class="card"><input type="month" id="reconMonth" onchange="renderRecon()"></div>
        <div style="display: flex; gap: 10px;">
            <div class="card" id="reconVendorList" style="width: 150px; font-size:12px; max-height: 450px; overflow-y: auto; padding:5px;"></div>
            <div id="reconDetailArea" style="flex: 1;"></div>
        </div>
        <div id="reconSummaryArea" class="card" style="display:none; background: #fffbe6; font-size: 16px; border: 1px solid #ffe58f;"></div>
        <div id="reconAction" class="card" style="display:none;">
            <h4 style="margin:0 0 5px;">➕ 補錄/修改當日總額</h4>
            <p style="font-size:11px; color:gray;">(會直接修改該日期之總金額數據)</p>
            <div class="grid">
                <input type="number" id="addDay" placeholder="日期">
                <input type="number" id="addAmt" placeholder="金額">
            </div>
            <button class="btn btn-primary" onclick="manualUpdateVendorTotal()">儲存修改</button>
        </div>
    </div>

    <div id="report" class="tab-content">
        <div class="card"><input type="month" id="rMonth" onchange="genFullReport()"></div>
        <div id="repArea" style="display:none;"></div>
        <button class="btn btn-primary" style="margin-top:10px;" onclick="exportPDF()">📥 輸出正式 PDF 報表檔案</button>
    </div>

    <div id="monthly" class="tab-content">
        <div class="card"><input type="month" id="mMonth" onchange="loadMonthly()"></div>
        <div class="card">
            <h4 style="margin:0 0 10px;">營運支出與抄表</h4>
            <div class="grid">
                <div class="form-group"><label>總表110</label><input type="number" id="me110" oninput="showLiveCalc('e110')"><div id="hint_e110" class="calc-hint"></div></div>
                <div class="form-group"><label>總表220</label><input type="number" id="me220" oninput="showLiveCalc('e220')"><div id="hint_e220" class="calc-hint"></div></div>
                <div class="form-group"><label>分表110</label><input type="number" id="mse110" oninput="showLiveCalc('se110')"><div id="hint_se110" class="calc-hint"></div></div>
                <div class="form-group"><label>分表220</label><input type="number" id="mse220" oninput="showLiveCalc('se220')"><div id="hint_se220" class="calc-hint"></div></div>
                <div class="form-group"><label>水費抄表</label><input type="number" id="mw" oninput="showLiveCalc('w')"><div id="hint_w" class="calc-hint"></div></div>
                <div class="form-group"><label>瓦斯抄表</label><input type="number" id="mg" oninput="showLiveCalc('g')"><div id="hint_g" class="calc-hint"></div></div>
                <div class="form-group"><label>租金</label><input type="number" id="mrent"></div>
                <div class="form-group"><label>公攤費</label><input type="number" id="mpub"></div>
                <div class="form-group"><label>設備租賃</label><input type="number" id="mlease"></div>
                <div class="form-group"><label>稅金基數</label><input type="number" id="mtaxb"></div>
            </div>
            <div id="mStaffArea"></div>
            <button class="btn btn-success" onclick="saveMonthlyAndGo()">🚀 送出並同步報表</button>
        </div>
    </div>

    <div id="settings" class="tab-content">
        <div class="card">
            <div class="grid">
                <div class="form-group"><label>電單價</label><input type="number" id="upElec"></div>
                <div class="form-group"><label>水單價</label><input type="number" id="upWater"></div>
                <div class="form-group"><label>瓦斯單價</label><input type="number" id="upGas"></div>
                <div class="form-group"><label>零用金</label><input type="number" id="sPetty"></div>
            </div>
        </div>
        <div class="card">
            <h4 class="section-title">抄表起始度數</h4>
            <div class="grid">
                <div class="form-group"><label>總110始</label><input type="number" id="si110"></div>
                <div class="form-group"><label>總220始</label><input type="number" id="si220"></div>
                <div class="form-group"><label>分110始</label><input type="number" id="sis110"></div>
                <div class="form-group"><label>分220始</label><input type="number" id="sis220"></div>
                <div class="form-group"><label>水起始</label><input type="number" id="siw"></div>
                <div class="form-group"><label>瓦斯起始</label><input type="number" id="sig"></div>
            </div>
        </div>
        <div class="card">
            <h4 class="section-title">👥 人員與廠商管理</h4>
            <div id="listStaff"></div><button class="btn btn-primary" onclick="addStaff()">+ 員工</button>
            <hr>
            <div id="listVendor"></div><button class="btn btn-primary" onclick="addVendor()">+ 廠商</button>
        </div>
        <button class="btn btn-success" onclick="saveSettings()">💾 儲存設定</button>
    </div>

    <div id="data" class="tab-content">
        <div class="card">
            <button class="btn btn-primary" onclick="backupData()">📥 備份數據</button>
            <button class="btn btn-danger" onclick="clearAllData()">⚠️ 清空所有資料（含設定）</button>
        </div>
    </div>
</div>

<script>
const KEY = "w21_";
const get = (k)=>JSON.parse(localStorage.getItem(KEY+k)) || [];
const set = (k,v)=>localStorage.setItem(KEY+k, JSON.stringify(v));
const cfg = ()=>JSON.parse(localStorage.getItem(KEY+'cfg')) || {petty:8000, i110:0, i220:0, is110:0, is220:0, iw:0, ig:0, ue:5, uw:12, ug:20};

function initApp(){
    document.getElementById('logDate').valueAsDate = new Date();
    const curMonth = new Date().toISOString().slice(0, 7);
    ['rMonth','mMonth','reconMonth'].forEach(id=>document.getElementById(id).value = curMonth);
    loadDaily();
}

/* --- 對帳中心恢復 --- */
function renderRecon(){
    const vs = get('vendors');
    let html = "";
    vs.forEach(v => {
        html += `<label class="vendor-item"><input type="checkbox" class="recon-chk" value="${v.name}" onchange="calcRecon()"> ${v.name}</label>`;
    });
    document.getElementById('reconVendorList').innerHTML = html;
    document.getElementById('reconDetailArea').innerHTML = "請勾選廠商進行統計";
    document.getElementById('reconSummaryArea').style.display = 'none';
    document.getElementById('reconAction').style.display = 'none';
}

function calcRecon(){
    const chks = document.querySelectorAll('.recon-chk:checked');
    const month = document.getElementById('reconMonth').value;
    if(chks.length === 0){
        document.getElementById('reconDetailArea').innerHTML = "請勾選廠商";
        document.getElementById('reconSummaryArea').style.display = 'none';
        document.getElementById('reconAction').style.display = 'none';
        return;
    }

    let names = Array.from(chks).map(c => c.value);
    let totalAll = 0;
    let dayData = {}; // 用於統計每日明細

    for(let i=1; i<=31; i++){
        const date = month + '-' + String(i).padStart(2,'0');
        const d = JSON.parse(localStorage.getItem(KEY+'d_'+date));
        if(d && d.vs){
            let daySum = 0;
            for(let k in d.vs){
                let match = names.some(n => k === n || k.startsWith(n + '_'));
                if(match){
                    const p = k.split('_');
                    const val = parseFloat(d.vs[k]) || 0;
                    daySum += (p.length === 3 ? val * parseFloat(p[2]) : val);
                }
            }
            if(daySum > 0) { dayData[i] = daySum; totalAll += daySum; }
        }
    }

    let listHtml = `<table><tr><th>日期</th><th>所選廠商合計</th></tr>`;
    Object.keys(dayData).forEach(day => {
        listHtml += `<tr><td>${day}號</td><td>$${Math.round(dayData[day]).toLocaleString()}</td></tr>`;
    });
    listHtml += `</table>`;
    
    document.getElementById('reconDetailArea').innerHTML = listHtml;
    document.getElementById('reconSummaryArea').style.display = 'block';
    document.getElementById('reconSummaryArea').innerHTML = `<b>勾選統計</b><br>總計金額：<span style="color:red; font-size:20px;">$${Math.round(totalAll).toLocaleString()}</span>`;
    
    // 如果只勾一個，顯示補錄按鈕
    document.getElementById('reconAction').style.display = (chks.length === 1) ? 'block' : 'none';
}

function manualUpdateVendorTotal(){
    const day = document.getElementById('addDay').value;
    const amt = document.getElementById('addAmt').value;
    const vn = document.querySelector('.recon-chk:checked').value;
    if(!day || !amt) return alert('請輸入完整');
    const month = document.getElementById('reconMonth').value;
    const date = month + '-' + String(day).padStart(2,'0');
    const d = JSON.parse(localStorage.getItem(KEY+'d_'+date)) || {vs:{}};
    if(!d.vs) d.vs = {};
    for(let k in d.vs) { if(k.startsWith(vn+'_')) delete d.vs[k]; }
    d.vs[vn] = parseFloat(amt);
    set('d_'+date, d);
    calcRecon();
    alert('儲存成功');
}

/* --- 報表中心恢復 --- */
function genFullReport(){
    const month = document.getElementById('rMonth').value, m = JSON.parse(localStorage.getItem(KEY+'m_'+month)), c = cfg();
    if(!m) { document.getElementById('repArea').style.display='block'; document.getElementById('repArea').innerHTML = "<div class='card'>請先完成月結算存檔</div>"; return; }
    
    let dayRows="", tCash=0, tOnline=0, tScan=0, tDays=0, vSum={};
    for(let i=1; i<=31; i++){
        const date = month + '-' + String(i).padStart(2,'0'), d = JSON.parse(localStorage.getItem(KEY+'d_'+date));
        if(d){
            const val = (v)=>parseFloat(v)||0;
            const cRaw = (val(d.c1000)*1000) + (val(d.c100)*100) + (Math.max(0, val(d.w50)-26)*5) + (Math.max(0, val(d.w10)-26)*1.33) + (Math.max(0, val(d.w5)-26)*1.1) - c.petty;
            const pOnline = val(d.pOnline), pScan = val(d.pScan);
            const dayTotal = cRaw + pOnline + pScan;
            if(dayTotal !== 0) {
                dayRows += `<tr><td>${i}</td><td>$${Math.round(cRaw).toLocaleString()}</td><td>$${pOnline.toLocaleString()}</td><td>$${pScan.toLocaleString()}</td><td>$${Math.round(dayTotal).toLocaleString()}</td></tr>`;
                tCash += cRaw; tOnline += pOnline; tScan += pScan; tDays++;
            }
            if(d.vs) for(let k in d.vs){
                const p=k.split('_'), amt = p.length===3 ? (parseFloat(d.vs[k])*parseFloat(p[2])) : parseFloat(d.vs[k]);
                vSum[p[0]] = (vSum[p[0]]||0) + amt;
            }
        }
    }

    let vendorDetailHtml = "";
    Object.keys(vSum).forEach(vn => vendorDetailHtml += `<tr><td>${vn}</td><td>$${Math.round(vSum[vn]).toLocaleString()}</td></tr>`);
    const tVendor = Object.values(vSum).reduce((a,b)=>a+b, 0);

    const eNet = ((m.e110||c.i110)-c.i110)+((m.e220||c.i220)-c.i220)-((m.se110||c.is110)-c.is110)-((m.se220||c.is220)-c.is220);
    const fixedItems = [
        {n:'店面租金',v:m.rent}, {n:'公攤費(0.75折)',v:m.pub*0.75}, {n:'設備租賃',v:m.lease},
        {n:`電費(${Math.round(eNet)}度)`,v:eNet*c.ue}, {n:`水費`,v:((m.w||c.iw)-c.iw)*c.uw}, 
        {n:`瓦斯`,v:((m.g||c.ig)-c.ig)*c.ug}, {n:'稅金(5%)',v:m.taxb*0.05}
    ];
    let fixedDetailHtml = fixedItems.map(item => `<tr><td>${item.n}</td><td>$${Math.round(item.v||0).toLocaleString()}</td></tr>`).join('');
    const tFixed = fixedItems.reduce((a,b)=>a+(b.v||0), 0);

    let staffDetailHtml = "";
    let tStaff = 0;
    get('staff').forEach(s => {
        const hours = m.staff?.[s.n]||0;
        const bonusPct = m.bonus?.[s.n]||0;
        const baseSalary = hours * s.r;
        const bonusAmt = baseSalary * (bonusPct / 100);
        const totalSalary = baseSalary + bonusAmt;
        staffDetailHtml += `<tr><td>${s.n}</td><td>${hours} hr</td><td>$${s.r}/hr</td><td>${bonusPct}%</td><td>$${Math.round(totalSalary).toLocaleString()}</td></tr>`;
        tStaff += totalSalary;
    });

    const totalRev = tCash + tOnline + tScan;

    document.getElementById('repArea').style.display='block';
    document.getElementById('repArea').innerHTML = `
        <div id="pdfPrintTarget" style="padding:10px;">
            <h2 style="text-align:center;">Wazi 早餐店 - ${month} 報表</h2>
            <h3 class="section-title">📅 每日明細</h3>
            <table><tr><th>日</th><th>現金</th><th>網路</th><th>掃碼</th><th>總額</th></tr>${dayRows}
            <tr class="total-row"><td>總計</td><td>$${Math.round(tCash).toLocaleString()}</td><td>$${Math.round(tOnline).toLocaleString()}</td><td>$${Math.round(tScan).toLocaleString()}</td><td>$${Math.round(totalRev).toLocaleString()}</td></tr></table>
            <div style="text-align:right; margin:8px 0; font-weight:bold; font-size:13px; color:#555;">
                計算天數：${tDays} 天 | 日均營業額：$${tDays > 0 ? Math.round(totalRev/tDays).toLocaleString() : 0}
            </div>
            <h3 class="section-title">📦 廠商支出</h3>
            <table><tr><th>廠商</th><th>金額</th></tr>${vendorDetailHtml}<tr class="total-row"><td>總計</td><td>$${Math.round(tVendor).toLocaleString()}</td></tr></table>
            <h3 class="section-title">🏢 固定支出</h3>
            <table><tr><th>項目</th><th>金額</th></tr>${fixedDetailHtml}<tr class="total-row"><td>總計</td><td>$${Math.round(tFixed).toLocaleString()}</td></tr></table>
            <h3 class="section-title">👥 人事明細</h3>
            <table><tr><th>姓名</th><th>工時</th><th>時薪</th><th>獎金%</th><th>薪資</th></tr>${staffDetailHtml}
            <tr class="total-row"><td colspan="4">人事總計</td><td>$${Math.round(tStaff).toLocaleString()}</td></tr></table>
            <div class="profit-box">本月純利：$${Math.round(totalRev - tVendor - tFixed - tStaff).toLocaleString()}</div>
        </div>`;
}

// 其餘函數 logic 完全不動
async function exportPDF(){
    const month = document.getElementById('rMonth').value, m = JSON.parse(localStorage.getItem(KEY+'m_'+month));
    if(!m) return alert('無數據');
    const canvas = await html2canvas(document.getElementById('pdfPrintTarget'), { scale: 3 });
    const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
    pdf.save(`Wazi_${month}.pdf`);
    const c = cfg(); c.i110=m.e110; c.i220=m.e220; c.is110=m.se110; c.is220=m.se220; c.iw=m.w; c.ig=m.g; set('cfg',c);
    alert('PDF 已下載');
}
function loadDaily(){
    const date = document.getElementById('logDate').value;
    const d = JSON.parse(localStorage.getItem(KEY+'d_'+date)) || {vs:{}};
    ['c1000','c100','w50','w10','w5','pOnline','pScan'].forEach(f=>document.getElementById(f).value=d[f]||'');
    let html = "";
    get('vendors').forEach(v => {
        if(v.type==='金額'){ html += `<div class="v-row"><b>${v.name}</b><input type="number" class="vd-input" data-name="${v.name}" value="${d.vs[v.name]||''}"></div>`;
        } else { (v.items||[]).forEach(it => { const key = v.name+'_'+it.n+'_'+it.p; html += `<div class="v-row"><b>${v.name}-${it.n}</b><input type="number" class="vit-qty" data-v="${v.name}" data-n="${it.n}" data-p="${it.p}" value="${d.vs[key]||''}"></div>`; }); }
    });
    document.getElementById('vDailyArea').innerHTML = html;
    calcDaily();
}
function saveDaily(){
    const date = document.getElementById('logDate').value, vs = {};
    document.querySelectorAll('.vd-input').forEach(i => vs[i.dataset.name] = parseFloat(i.value)||0);
    document.querySelectorAll('.vit-qty').forEach(i => vs[i.dataset.v+'_'+i.dataset.n+'_'+i.dataset.p] = parseFloat(i.value)||0);
    set('d_'+date, { c1000:document.getElementById('c1000').value, c100:document.getElementById('c100').value, w50:document.getElementById('w50').value, w10:document.getElementById('w10').value, w5:document.getElementById('w5').value, pOnline:document.getElementById('pOnline').value, pScan:document.getElementById('pScan').value, vs: vs });
    alert('儲存成功');
}
function loadMonthly(){
    const m = JSON.parse(localStorage.getItem(KEY+'m_'+document.getElementById('mMonth').value))||{staff:{}, bonus:{}};
    document.getElementById('mStaffArea').innerHTML = get('staff').map(s=>`<div class="card"><b>${s.n}</b><div class="grid"><div class="form-group"><label>工時</label><input type="number" class="ms-qty" data-n="${s.n}" value="${m.staff?.[s.n]||''}"></div><div class="form-group"><label>獎金%</label><input type="number" class="ms-bonus" data-n="${s.n}" value="${m.bonus?.[s.n]||''}"></div></div></div>`).join('');
    ['e110','e220','se110','se220','w','g','pub','rent','taxb','lease'].forEach(k=>document.getElementById('m'+k).value=m[k]||'');
}
function saveMonthlyAndGo(){
    const m = document.getElementById('mMonth').value, s={}, b={};
    document.querySelectorAll('.ms-qty').forEach(i=>s[i.dataset.n]=parseFloat(i.value)||0);
    document.querySelectorAll('.ms-bonus').forEach(i=>b[i.dataset.n]=parseFloat(i.value)||0);
    set('m_'+m, { staff:s, bonus:b, e110:parseFloat(document.getElementById('me110').value)||0, e220:parseFloat(document.getElementById('me220').value)||0, se110:parseFloat(document.getElementById('mse110').value)||0, se220:parseFloat(document.getElementById('mse220').value)||0, w:parseFloat(document.getElementById('mw').value)||0, g:parseFloat(document.getElementById('mg').value)||0, pub:parseFloat(document.getElementById('mpub').value)||0, rent:parseFloat(document.getElementById('mrent').value)||0, taxb:parseFloat(document.getElementById('mtaxb').value)||0, lease:parseFloat(document.getElementById('mlease').value)||0 });
    document.getElementById('rMonth').value = m; switchTab('report');
}
function switchTab(id){
    document.querySelectorAll('.tab-content, .tab-btn').forEach(el=>el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    const btn = document.querySelector(`.tab-btn[onclick*="${id}"]`);
    if(btn) btn.classList.add('active');
    if(id==='report') genFullReport();
    if(id==='daily') loadDaily();
    if(id==='settings') renderSettings();
    if(id==='monthly') loadMonthly();
    if(id==='recon') renderRecon();
}
function showLiveCalc(type){
    const c = cfg(); const cur = parseFloat(document.getElementById('m'+type).value) || 0;
    const start = c[{e110:'i110',e220:'i220',se110:'is110',se220:'is220',w:'iw',g:'ig'}[type]] || 0;
    const diff = Math.max(0, cur - start);
    const amt = diff * {e110:c.ue,e220:c.ue,se110:c.ue,se220:c.ue,w:c.uw,g:c.ug}[type];
    document.getElementById('hint_'+type).innerText = `用量: ${diff} | 金額: $${Math.round(amt)}`;
}
function calcDaily(){
    const c = cfg(); const val = (id)=>parseFloat(document.getElementById(id).value) || 0;
    const cash = (val('c1000')*1000) + (val('c100')*100) + (Math.max(0, val('w50')-26)*5) + (Math.max(0, val('w10')-26)*1.33) + (Math.max(0, val('w5')-26)*1.1);
    document.getElementById('cSumDisplay').innerText = `$ ${Math.round(cash-c.petty+val('pOnline')+val('pScan')).toLocaleString()}`;
}
function renderSettings(){
    const c = cfg(); const map = {upElec:'ue', upWater:'uw', upGas:'ug', sPetty:'petty', si110:'i110', si220:'i220', sis110:'is110', sis220:'is220', siw:'iw', sig:'ig'};
    Object.keys(map).forEach(id=>document.getElementById(id).value = c[map[id]]||0);
    document.getElementById('listStaff').innerHTML = get('staff').map((s,i)=>`<div>${s.n} ($${s.r}) <button class="btn-danger" style="padding:2px 5px;font-size:10px" onclick="del('staff',${i})">刪</button></div>`).join('');
    document.getElementById('listVendor').innerHTML = get('vendors').map((v,i)=>`<div>${v.name} (${v.type}) <button class="btn-danger" style="padding:2px 5px;font-size:10px" onclick="del('vendors',${i})">刪</button></div>`).join('');
}
function saveSettings(){
    set('cfg', { ue:parseFloat(document.getElementById('upElec').value), uw:parseFloat(document.getElementById('upWater').value), ug:parseFloat(document.getElementById('upGas').value), petty:parseFloat(document.getElementById('sPetty').value), i110:parseFloat(document.getElementById('si110').value), i220:parseFloat(document.getElementById('si220').value), is110:parseFloat(document.getElementById('sis110').value), is220:parseFloat(document.getElementById('sis220').value), iw:parseFloat(document.getElementById('siw').value), ig:parseFloat(document.getElementById('sig').value) });
    alert('已儲存');
}
function addStaff(){ const n=prompt('姓名'); if(n){ const s=get('staff'); s.push({n:n, r:parseFloat(prompt('時薪','190'))}); set('staff',s); renderSettings(); } }
function addVendor(){ const n=prompt('廠商名'); if(n){ const t=confirm('按品項輸入?')?'品項':'金額'; const v=get('vendors'); v.push({name:n, type:t, items:[]}); if(t==='品項'){ let iname; while(iname=prompt('品項名(留空結束)')){ v[v.length-1].items.push({n:iname, p:parseFloat(prompt('單價','0'))}); } } set('vendors',v); renderSettings(); } }
function del(k,i){ const d=get(k); d.splice(i,1); set(k,d); renderSettings(); }
function backupData(){ const d={}; Object.keys(localStorage).forEach(k=>{ if(k.startsWith(KEY)) d[k]=localStorage.getItem(k); }); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(d)],{type:'application/json'})); a.download=`Wazi_Backup.json`; a.click(); }
function clearAllData(){ if(confirm('警告：確定要清空所有資料嗎？')){ localStorage.clear(); location.reload(); } }
</script>
