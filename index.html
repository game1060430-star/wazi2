<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wazi 旗艦管理系統 8.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #f4f7f6; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 12px; }
        .tab-btn { padding: 10px 2px; background: #e0e0e0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .tab-btn.active { background: #764ba2; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 11px; color: #777; margin-bottom: 4px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-success { background: #28a745; color: white; }
        .btn-primary { background: #007bff; color: white; }
        .btn-danger { background: #dc3545; color: white; padding: 4px 8px; font-size: 11px; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        table th, table td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .section-title { border-left: 4px solid #764ba2; padding-left: 8px; margin: 15px 0 10px; font-size: 16px; font-weight: bold; }
        .report-preview { background: white; border: 1px solid #ccc; padding: 20px; color: #000; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('daily')">每日記帳</button>
        <button class="tab-btn" onclick="switchTab('report')">報表中心</button>
        <button class="tab-btn" onclick="switchTab('monthly')">月結算</button>
        <button class="tab-btn" onclick="switchTab('settings')">系統設定</button>
    </div>

    <div id="daily" class="tab-content active">
        <div class="card"><input type="date" id="logDate" onchange="loadDaily()" style="width:100%; border:none; font-size:18px; font-weight:bold; text-align:center;"></div>
        <div class="card">
            <h4 style="margin:0 0 10px;">💰 今日收銀</h4>
            <div class="grid">
                <div class="form-group"><label>千元(張)</label><input type="number" id="c1000" oninput="calcDaily()"></div>
                <div class="form-group"><label>百元(張)</label><input type="number" id="c100" oninput="calcDaily()"></div>
            </div>
            <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
                <div class="form-group"><label>$50重量</label><input type="number" id="w50" oninput="calcDaily()"></div>
                <div class="form-group"><label>$10重量</label><input type="number" id="w10" oninput="calcDaily()"></div>
                <div class="form-group"><label>$5重量</label><input type="number" id="w5" oninput="calcDaily()"></div>
            </div>
            <div class="grid">
                <div class="form-group"><label>網路收入</label><input type="number" id="pOnline" oninput="calcDaily()"></div>
                <div class="form-group"><label>掃碼支付</label><input type="number" id="pScan" oninput="calcDaily()"></div>
            </div>
        </div>
        <h4 class="section-title">📦 廠商進貨</h4>
        <div id="vDailyArea"></div>
        <button class="btn btn-success" onclick="saveDaily()">✅ 儲存今日數據</button>
    </div>

    <div id="report" class="tab-content">
        <div class="card">
            <label style="font-size:12px; font-weight:bold;">選擇查看月份：</label>
            <input type="month" id="rMonth" onchange="genFullReport()" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
        </div>
        
        <div id="repArea" class="report-preview" style="display:none;">
            </div>

        <div class="grid" style="margin-top:10px;">
            <button class="btn btn-primary" id="rPdfBtn" style="display:none;" onclick="exportPDF()">📥 輸出 PDF 報表</button>
            <button class="btn btn-success" id="rFinalBtn" style="display:none;" onclick="exportPDF(true)">🏁 輸出並結轉度數</button>
        </div>
    </div>

    <div id="monthly" class="tab-content">
        <div class="card"><input type="month" id="mMonth" onchange="loadMonthly()"></div>
        <div class="card">
            <h4 style="margin:0 0 10px;">👥 月末抄表與工時</h4>
            <div id="mStaffArea"></div>
            <hr>
            <div class="grid">
                <div class="form-group"><label>總 110V 收尾</label><input type="number" id="me110"></div>
                <div class="form-group"><label>總 220V 收尾</label><input type="number" id="me220"></div>
                <div class="form-group"><label>分 110V 收尾</label><input type="number" id="mse110"></div>
                <div class="form-group"><label>分 220V 收尾</label><input type="number" id="mse220"></div>
                <div class="form-group"><label>水費 收尾</label><input type="number" id="mw"></div>
                <div class="form-group"><label>瓦斯 收尾</label><input type="number" id="mg"></div>
            </div>
            <div class="grid">
                <div class="form-group"><label>公攤費</label><input type="number" id="mpub"></div>
                <div class="form-group"><label>租金</label><input type="number" id="mrent"></div>
                <div class="form-group"><label>稅金基數</label><input type="number" id="mtaxb"></div>
                <div class="form-group"><label>設備租賃</label><input type="number" id="mlease"></div>
            </div>
            <button class="btn btn-success" onclick="saveMonthly()">💾 儲存結算數據</button>
        </div>
    </div>

    <div id="settings" class="tab-content">
        <div class="section-title">👥 人事管理</div>
        <div class="card"><div id="listStaff"></div><div style="background:#f9f9f9; padding:10px; border-radius:8px; margin-top:10px;"><div class="grid"><input type="text" id="nsName" placeholder="姓名"><input type="number" id="nsRate" placeholder="時薪"></div><input type="number" id="nsBonus" placeholder="獎金 %" style="margin-top:5px;"><button class="btn btn-primary" onclick="addStaff()">+ 新增員工</button></div></div>
        <div class="section-title">📦 廠商管理</div>
        <div class="card"><div id="listVendor"></div><div style="background:#f9f9f9; padding:10px; border-radius:8px; margin-top:10px;"><div class="grid"><input type="text" id="nvName" placeholder="廠商"><select id="nvType"><option value="金額">直接填金額</option><option value="品項">填品項數量</option></select></div><button class="btn btn-primary" onclick="addVendor()">+ 新增廠商</button></div></div>
        <div class="section-title">⚙️ 預設常數</div>
        <div class="card"><div class="grid"><div class="form-group"><label>零用金</label><input type="number" id="sPetty"></div><div class="form-group"><label>手續費%</label><input type="number" id="sFee"></div><div class="form-group"><label>電費單價</label><input type="number" id="upElec"></div><div class="form-group"><label>水費單價</label><input type="number" id="upWater"></div><div class="form-group"><label>瓦斯單價</label><input type="number" id="upGas"></div></div></div>
        <div class="section-title">📏 起始度數</div>
        <div class="card"><div class="grid"><div class="form-group"><label>總 110V</label><input type="number" id="si110"></div><div class="form-group"><label>總 220V</label><input type="number" id="si220"></div><div class="form-group"><label>分 110V</label><input type="number" id="sis110"></div><div class="form-group"><label>分 220V</label><input type="number" id="sis220"></div><div class="form-group"><label>水起始</label><input type="number" id="siw"></div><div class="form-group"><label>瓦斯起始</label><input type="number" id="sig"></div></div></div>
        <button class="btn btn-success" onclick="saveSettings()">💾 儲存設定</button>
    </div>
</div>

<script>
// --- 基礎數據存取 ---
const get = (k)=>JSON.parse(localStorage.getItem('w8_'+k)) || [];
const set = (k,v)=>localStorage.setItem('w8_'+k, JSON.stringify(v));
const cfg = ()=>JSON.parse(localStorage.getItem('w8_cfg')) || {petty:8000, fee:2.4, i110:0, i220:0, is110:0, is220:0, iw:0, ig:0, ue:5, uw:12, ug:20};

document.getElementById('logDate').valueAsDate = new Date();
document.getElementById('rMonth').value = new Date().toISOString().slice(0, 7);

function switchTab(id){
    document.querySelectorAll('.tab-content, .tab-btn').forEach(el=>el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
    if(id==='settings') renderSettings();
    if(id==='daily') loadDaily();
    if(id==='report') genFullReport();
}

// --- 每日記帳 Logic ---
function calcDaily(){} // 純計算，不影響儲存
function loadDaily(){
    const date = document.getElementById('logDate').value;
    const d = JSON.parse(localStorage.getItem('d_'+date)) || {vs:{}};
    ['c1000','c100','w50','w10','w5','pOnline','pScan'].forEach(f=>document.getElementById(f).value=d[f]||'');
    const vendors = get('vendors');
    document.getElementById('vDailyArea').innerHTML = vendors.map(v => {
        if(v.type === '金額'){ return `<div class="card"><label>${v.name}</label><input type="number" class="vd-input" data-name="${v.name}" value="${d.vs[v.name]||''}"></div>`; }
        else { const items = (v.items||[]).map(it => `<div style="display:flex; justify-content:space-between; margin-bottom:5px; background:#f9f9f9; padding:5px; border-radius:5px;"><span style="font-size:12px;">${it.n} ($${it.p})</span><input type="number" step="any" class="vit-qty" data-v="${v.name}" data-n="${it.n}" data-p="${it.p}" value="${d.vs[v.name+'_'+it.n]||''}" style="width:80px;"></div>`).join(''); return `<div class="card"><b>${v.name}</b>${items}</div>`; }
    }).join('');
}
function saveDaily(){
    const date = document.getElementById('logDate').value;
    const vs = {};
    document.querySelectorAll('.vd-input').forEach(i => vs[i.dataset.name] = parseFloat(i.value)||0);
    document.querySelectorAll('.vit-qty').forEach(i => vs[i.dataset.v+'_'+i.dataset.n] = parseFloat(i.value)||0);
    const data = { c1000:document.getElementById('c1000').value, c100:document.getElementById('c100').value, w50:document.getElementById('w50').value, w10:document.getElementById('w10').value, w5:document.getElementById('w5').value, pOnline:document.getElementById('pOnline').value, pScan:document.getElementById('pScan').value, vs: vs };
    localStorage.setItem('d_'+date, JSON.stringify(data)); alert('今日數據已儲存！');
}

// --- 月結算 Logic (僅儲存) ---
function loadMonthly(){
    const month = document.getElementById('mMonth').value;
    const m = JSON.parse(localStorage.getItem('m_'+month))||{staff:{}};
    document.getElementById('mStaffArea').innerHTML = get('staff').map(s=>`<div class="form-group"><label>${s.n} 本月工時</label><input type="number" class="ms-qty" data-n="${s.n}" value="${m.staff[s.n]||''}"></div>`).join('');
    ['e110','e220','se110','se220','w','g','pub','rent','taxb','lease'].forEach(k=>document.getElementById('m'+k).value=m[k]||'');
}
function saveMonthly(){
    const month = document.getElementById('mMonth').value;
    const sMap = {}; document.querySelectorAll('.ms-qty').forEach(i=>sMap[i.dataset.n]=parseFloat(i.value)||0);
    const data = { staff: sMap, e110: parseFloat(document.getElementById('me110').value)||0, e220: parseFloat(document.getElementById('me220').value)||0, se110: parseFloat(document.getElementById('mse110').value)||0, se220: parseFloat(document.getElementById('mse220').value)||0, w: parseFloat(document.getElementById('mw').value)||0, g: parseFloat(document.getElementById('mg').value)||0, pub: parseFloat(document.getElementById('mpub').value)||0, rent: parseFloat(document.getElementById('mrent').value)||0, taxb: parseFloat(document.getElementById('mtaxb').value)||0, lease: parseFloat(document.getElementById('mlease').value)||0 };
    localStorage.setItem('m_'+month, JSON.stringify(data)); alert('月結數據已儲存，請至報表中心查看 PDF');
}

// --- 報表中心 (核心報表產生) ---
function genFullReport(){
    const month = document.getElementById('rMonth').value;
    const m = JSON.parse(localStorage.getItem('m_'+month)) || {staff:{}, rent:0, pub:0, taxb:0, lease:0};
    const c = cfg();
    let tCash = 0, tOnline = 0, tScan = 0, tDays = 0, tVendor = 0;
    
    // 統計營收與進貨
    for(let i=1; i<=31; i++){
        const d = JSON.parse(localStorage.getItem('d_'+month+'-'+String(i).padStart(2,'0')));
        if(d){
            tCash += (parseFloat(d.c1000)||0)*1000 + (parseFloat(d.c100)||0)*100 + Math.max(0,parseFloat(d.w50)-26)*5 + Math.max(0,parseFloat(d.w10)-26)*1.33 + Math.max(0,parseFloat(d.w5)-26)*1.1 - c.petty;
            tOnline += (parseFloat(d.pOnline)||0)*(1-c.fee/100);
            tScan += (parseFloat(d.pScan)||0)*(1-c.fee/100);
            tDays++;
            for(let key in d.vs){
                if(key.includes('_')){ tVendor += d.vs[key] * (parseFloat(key.split('_').pop())||0); } 
                else { tVendor += d.vs[key]; }
            }
        }
    }

    if(tDays === 0){ document.getElementById('repArea').style.display='none'; return; }

    // 人事費
    let tStaff = 0;
    const staffRows = get('staff').map(s=>{
        const hrs = m.staff[s.n]||0; const pay = (hrs*s.r)*(1+s.b/100); tStaff += pay;
        return `<tr><td>${s.n}</td><td>${hrs}</td><td>$${Math.round(pay).toLocaleString()}</td></tr>`;
    }).join('');

    // 能源費
    const eUse = ((m.e110||c.i110)-c.i110) + ((m.e220||c.i220)-c.i220);
    const eCost = eUse * c.ue;
    const wCost = ((m.w||c.iw)-c.iw)*c.uw;
    const gCost = ((m.g||c.ig)-c.ig)*c.ug;
    const tax = (m.taxb||0) * 0.05;
    const net = (tCash+tOnline+tScan) - tStaff - tVendor - (eCost+wCost+gCost) - ((m.pub||0)+(m.rent||0)+tax+(m.lease||0));

    const rep = document.getElementById('repArea');
    rep.style.display = 'block'; 
    document.getElementById('rPdfBtn').style.display = 'block';
    document.getElementById('rFinalBtn').style.display = 'block';
    rep.innerHTML = `
        <h2 style="text-align:center;">Wazi 早餐店 ${month} 營運報表</h2>
        <div class="section-title">💰 營業額摘要</div>
        <table>
            <tr><th>項目</th><th>累積金額</th></tr>
            <tr><td>現金收入 (扣除零用金)</td><td>$${Math.round(tCash).toLocaleString()}</td></tr>
            <tr><td>網路收入 (扣手續費)</td><td>$${Math.round(tOnline).toLocaleString()}</td></tr>
            <tr><td>掃碼支付 (扣手續費)</td><td>$${Math.round(tScan).toLocaleString()}</td></tr>
            <tr style="background:#eee;"><th>總營業額</th><th>$${Math.round(tCash+tOnline+tScan).toLocaleString()}</th></tr>
            <tr><td>日均營業額 (${tDays}天)</td><td>$${Math.round((tCash+tOnline+tScan)/tDays).toLocaleString()}</td></tr>
        </table>
        <div class="section-title">👥 人事與進貨</div>
        <table><tr><th>姓名</th><th>工時</th><th>薪資</th></tr>${staffRows}</table>
        <table><tr><td>總進貨支出</td><td>$${Math.round(tVendor).toLocaleString()}</td></tr></table>
        <div class="section-title">⚡ 能源與固定</div>
        <table>
            <tr><td>電力 (${eUse}度)</td><td>$${Math.round(eCost).toLocaleString()}</td><td>水/瓦斯</td><td>$${Math.round(wCost+gCost).toLocaleString()}</td></tr>
            <tr><td>租金/公攤</td><td>$${((m.rent||0)+(m.pub||0)).toLocaleString()}</td><td>稅金/租賃</td><td>$${Math.round(tax+(m.lease||0)).toLocaleString()}</td></tr>
        </table>
        <div style="font-size:22px; text-align:center; padding:15px; background:#000; color:white; border-radius:10px; margin-top:15px;">
            本月淨利: $${Math.round(net).toLocaleString()}
        </div>
    `;
}

async function exportPDF(isFinal = false){
    const month = document.getElementById('rMonth').value;
    const m = JSON.parse(localStorage.getItem('m_'+month));
    const canvas = await html2canvas(document.getElementById('repArea'));
    const pdf = new jspdf.jsPDF();
    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 10, 190, 0);
    pdf.save(`Wazi_${month}_Report.pdf`);
    
    if(isFinal && m){
        const c = cfg();
        c.i110=m.e110; c.i220=m.e220; c.is110=m.se110; c.is220=m.se220; c.iw=m.w; c.ig=m.g;
        set('cfg', c); alert('PDF 已輸出，度數已自動結轉至下月。');
    }
}

// --- 系統設定 (完整保留) ---
function renderSettings(){
    const c = cfg();
    ['sPetty','sFee','upElec','upWater','upGas','si110','si220','sis110','sis220','siw','sig'].forEach(id=>{
        const map = {sPetty:c.petty, sFee:c.fee, upElec:c.ue, upWater:c.uw, upGas:c.ug, si110:c.i110, si220:c.i220, sis110:c.is110, sis220:c.is220, siw:c.iw, sig:c.ig};
        document.getElementById(id).value = map[id];
    });
    document.getElementById('listStaff').innerHTML = get('staff').map((s,i)=>`<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${s.n} ($${s.r}/hr, ${s.b}%)</span><button class="btn-danger" onclick="del('staff',${i})">刪</button></div>`).join('');
    document.getElementById('listVendor').innerHTML = get('vendors').map((v,i)=>`<div class="card"><div style="display:flex; justify-content:space-between;"><b>${v.name}</b><button class="btn-danger" onclick="del('vendors',${i})">刪</button></div>${v.type==='品項'?`<div style="margin-top:5px;">${(v.items||[]).map((it,ii)=>`<div>${it.n} $${it.p} <button onclick="delItem(${i},${ii})">x</button></div>`).join('')}<input type="text" id="itn${i}" placeholder="品名" style="width:40%"> <input type="number" id="itp${i}" placeholder="單價" style="width:30%"> <button onclick="addItem(${i})">加</button></div>`:''}</div>`).join('');
}
function saveSettings(){ const c = { petty: parseFloat(document.getElementById('sPetty').value), fee: parseFloat(document.getElementById('sFee').value), ue: parseFloat(document.getElementById('upElec').value), uw: parseFloat(document.getElementById('upWater').value), ug: parseFloat(document.getElementById('upGas').value), i110: parseFloat(document.getElementById('si110').value), i220: parseFloat(document.getElementById('si220').value), is110: parseFloat(document.getElementById('sis110').value), is220: parseFloat(document.getElementById('sis220').value), iw: parseFloat(document.getElementById('siw').value), sig: parseFloat(document.getElementById('sig').value) }; set('cfg', c); alert('設定儲存！'); }
function addStaff(){ const s = get('staff'); s.push({n:document.getElementById('nsName').value, r:parseFloat(document.getElementById('nsRate').value), b:parseFloat(document.getElementById('nsBonus').value)||0}); set('staff',s); renderSettings(); }
function addVendor(){ const v = get('vendors'); v.push({name:document.getElementById('nvName').value, type:document.getElementById('nvType').value, items:[]}); set('vendors',v); renderSettings(); }
function addItem(vi){ const v = get('vendors'); v[vi].items.push({n:document.getElementById('itn'+vi).value, p:parseFloat(document.getElementById('itp'+vi).value)}); set('vendors',v); renderSettings(); }
function del(k,i){ const d = get(k); d.splice(i,1); set(k,d); renderSettings(); }
function delItem(vi,ii){ const v = get('vendors'); v[vi].items.splice(ii,1); set('vendors',v); renderSettings(); }
</script>
</body>
</html>
