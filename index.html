<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wazi 報表中心 5.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #f4f7f6; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .tab-btn { padding: 12px 5px; background: #e0e0e0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: #764ba2; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 12px; color: #777; margin-bottom: 4px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-success { background: #28a745; color: white; }
        .btn-primary { background: #007bff; color: white; }
        .btn-danger { background: #dc3545; color: white; padding: 4px 8px; font-size: 11px; border-radius: 4px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        table th, table td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .section-title { border-left: 4px solid #764ba2; padding-left: 8px; margin: 15px 0 10px; font-size: 16px; }
        .report-box { padding: 20px; background: white; border: 1px solid #ddd; }
        .highlight-red { color: #d9534f; font-weight: bold; }
        .highlight-green { color: #5cb85c; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('daily')">每日記帳</button>
        <button class="tab-btn" onclick="switchTab('monthly')">報表中心</button>
        <button class="tab-btn" onclick="switchTab('settings')">系統設定</button>
    </div>

    <div id="daily" class="tab-content active">
        <div class="card"><input type="date" id="logDate" onchange="loadDaily()" style="width:100%; border:none; font-size:18px; font-weight:bold; text-align:center;"></div>
        <div class="card">
            <h4 style="margin:0 0 10px;">💰 今日營收</h4>
            <div class="grid">
                <div class="form-group"><label>現金總額</label><input type="number" id="cDirect" oninput="calcDaily()"></div>
                <div class="form-group"><label>網路收入</label><input type="number" id="pOnline" oninput="calcDaily()"></div>
                <div class="form-group"><label>掃碼支付</label><input type="number" id="pScan" oninput="calcDaily()"></div>
            </div>
        </div>
        <div class="stat-card">
            <div style="font-size:14px; opacity:0.9;">今日總營業額</div>
            <div style="font-size:28px; font-weight:bold;" id="dNet">NT$ 0</div>
        </div>
        <h4>📦 廠商進貨記錄</h4>
        <div id="vDailyArea"></div>
        <button class="btn btn-success" onclick="saveDaily()">✅ 儲存今日記帳</button>
    </div>

    <div id="monthly" class="tab-content">
        <div class="card"><input type="month" id="mMonth" onchange="loadMonthly()"></div>
        <div class="card">
            <h4 style="margin-top:0;">👥 月份額外支出/工時確認</h4>
            <div id="mStaffArea"></div>
            <div class="grid" style="margin-top:10px;">
                <div class="form-group"><label>店面租金</label><input type="number" id="mrent"></div>
                <div class="form-group"><label>營業稅</label><input type="number" id="mtaxb"></div>
            </div>
        </div>
        <button class="btn btn-success" onclick="saveMonthly()">📊 產生本月報表</button>
        
        <div id="repArea" class="report-box" style="display:none; margin-top:15px;"></div>
        <button class="btn btn-primary" id="pdfBtn" style="display:none; margin-top:10px;" onclick="exportPDF()">📥 輸出 PDF 報表</button>
    </div>

    <div id="settings" class="tab-content">
        <div class="section-title">👥 人事與廠商</div>
        <div class="card">
            <div id="listStaff"></div>
            <input type="text" id="nsName" placeholder="員工姓名">
            <input type="number" id="nsRate" placeholder="時薪">
            <button class="btn btn-primary" onclick="addStaff()">+ 新增員工</button>
        </div>
        <div class="card">
            <div id="listVendor"></div>
            <input type="text" id="nvName" placeholder="廠商名稱">
            <button class="btn btn-primary" onclick="addVendor()">+ 新增廠商</button>
        </div>
    </div>
</div>

<script>
const get = (k)=>JSON.parse(localStorage.getItem('w5_'+k)) || [];
const set = (k,v)=>localStorage.setItem('w5_'+k, JSON.stringify(v));

function switchTab(id){
    document.querySelectorAll('.tab-content, .tab-btn').forEach(el=>el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
    if(id==='settings') renderSettings();
}

function calcDaily(){
    const cash = parseFloat(document.getElementById('cDirect').value)||0;
    const online = parseFloat(document.getElementById('pOnline').value)||0;
    const scan = parseFloat(document.getElementById('pScan').value)||0;
    document.getElementById('dNet').innerText = `NT$ ${Math.round(cash + online + scan).toLocaleString()}`;
}

function loadDaily(){
    const date = document.getElementById('logDate').value;
    const d = JSON.parse(localStorage.getItem('d_'+date)) || {vs:{}};
    document.getElementById('cDirect').value = d.cdir||'';
    document.getElementById('pOnline').value = d.pOnline||'';
    document.getElementById('pScan').value = d.pScan||'';
    
    const vendors = get('vendors');
    document.getElementById('vDailyArea').innerHTML = vendors.map(v => `
        <div class="card"><label>${v.name}</label><input type="number" class="vd-input" data-name="${v.name}" value="${d.vs[v.name]||''}"></div>
    `).join('');
    calcDaily();
}

function saveDaily(){
    const date = document.getElementById('logDate').value;
    const vs = {};
    document.querySelectorAll('.vd-input').forEach(i => vs[i.dataset.name] = parseFloat(i.value)||0);
    const data = {
        cdir:document.getElementById('cDirect').value, 
        pOnline:document.getElementById('pOnline').value, 
        pScan:document.getElementById('pScan').value,
        vs: vs
    };
    localStorage.setItem('d_'+date, JSON.stringify(data));
    alert('儲存成功');
}

function loadMonthly(){
    const month = document.getElementById('mMonth').value;
    const m = JSON.parse(localStorage.getItem('m_'+month))||{staff:{}};
    document.getElementById('mStaffArea').innerHTML = get('staff').map(s=>`
        <div class="form-group"><label>${s.n} 本月總工時</label><input type="number" class="ms-qty" data-n="${s.n}" value="${m.staff[s.n]||''}"></div>
    `).join('');
}

function saveMonthly(){
    const month = document.getElementById('mMonth').value;
    const sMap = {}; document.querySelectorAll('.ms-qty').forEach(i=>sMap[i.dataset.n]=parseFloat(i.value)||0);
    const data = {
        staff: sMap,
        rent: parseFloat(document.getElementById('mrent').value)||0,
        tax: parseFloat(document.getElementById('mtaxb').value)||0
    };
    localStorage.setItem('m_'+month, JSON.stringify(data));
    genReport();
}

function genReport(){
    const month = document.getElementById('mMonth').value;
    const m = JSON.parse(localStorage.getItem('m_'+month));
    if(!m) return;

    let tCash = 0, tOnline = 0, tScan = 0, tDays = 0;
    let vendorTotals = {};

    for(let i=1; i<=31; i++){
        const dateStr = month + '-' + String(i).padStart(2,'0');
        const d = JSON.parse(localStorage.getItem('d_'+dateStr));
        if(d){
            tCash += parseFloat(d.cdir)||0;
            tOnline += parseFloat(d.pOnline)||0;
            tScan += parseFloat(d.pScan)||0;
            tDays++;
            for(let v in d.vs){ vendorTotals[v] = (vendorTotals[v]||0) + d.vs[v]; }
        }
    }

    const tRev = tCash + tOnline + tScan;
    const avgRev = tDays > 0 ? tRev / tDays : 0;
    
    let tStaff = 0;
    const staffRows = get('staff').map(s=>{
        const pay = (m.staff[s.n]||0) * s.r; tStaff += pay;
        return `<tr><td>${s.n}</td><td>${m.staff[s.n]||0}</td><td>$${pay.toLocaleString()}</td></tr>`;
    }).join('');

    let tVendor = 0;
    const vRows = Object.keys(vendorTotals).map(v=>{
        tVendor += vendorTotals[v];
        return `<tr><td>${v}</td><td>$${vendorTotals[v].toLocaleString()}</td></tr>`;
    }).join('');

    const tFixed = m.rent + m.tax;
    const netProfit = tRev - tStaff - tVendor - tFixed;

    const rep = document.getElementById('repArea');
    rep.style.display = 'block';
    document.getElementById('pdfBtn').style.display = 'block';
    rep.innerHTML = `
        <h2 style="text-align:center; color:#764ba2;">Wazi 早餐店 ${month} 營運報表</h2>
        <div class="section-title">💰 營業額摘要</div>
        <table>
            <tr><th>項目</th><th>月總額</th></tr>
            <tr><td>現金收入</td><td>$${tCash.toLocaleString()}</td></tr>
            <tr><td>網路收入</td><td>$${tOnline.toLocaleString()}</td></tr>
            <tr><td>掃碼支付</td><td>$${tScan.toLocaleString()}</td></tr>
            <tr style="background:#f0e6ff;"><th>總營業額</th><th>$${tRev.toLocaleString()}</th></tr>
            <tr><th>日均營業額</th><td>$${Math.round(avgRev).toLocaleString()}</td></tr>
        </table>

        <div class="section-title">支出明細</div>
        <table><tr><th>人事名稱</th><th>工時</th><th>薪資</th></tr>${staffRows}</table>
        <table><tr><th>廠商名稱</th><th>採購金額</th></tr>${vRows}</table>
        <table><tr><th>固定支出</th><th>金額</th></tr><tr><td>租金+稅金</td><td>$${tFixed.toLocaleString()}</td></tr></table>

        <div class="section-title">📈 本月結算</div>
        <div style="font-size:20px; text-align:center; padding:10px;">
            最終淨利: <span class="${netProfit>=0?'highlight-green':'highlight-red'}">$${Math.round(netProfit).toLocaleString()}</span>
        </div>
    `;
}

async function exportPDF(){
    const month = document.getElementById('mMonth').value;
    const canvas = await html2canvas(document.getElementById('repArea'));
    const pdf = new jspdf.jsPDF();
    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 10, 190, 0);
    pdf.save(`Wazi_Report_${month}.pdf`);
}

function renderSettings(){
    document.getElementById('listStaff').innerHTML = get('staff').map((s,i)=>`<div>${s.n} ($${s.r}/hr) <button onclick="del('staff',${i})">刪</button></div>`).join('');
    document.getElementById('listVendor').innerHTML = get('vendors').map((v,i)=>`<div>${v.name} <button onclick="del('vendors',${i})">刪</button></div>`).join('');
}
function addStaff(){ const s = get('staff'); s.push({n:document.getElementById('nsName').value, r:parseFloat(document.getElementById('nsRate').value)}); set('staff',s); renderSettings(); }
function addVendor(){ const v = get('vendors'); v.push({name:document.getElementById('nvName').value}); set('vendors',v); renderSettings(); }
function del(k,i){ const d = get(k); d.splice(i,1); set(k,d); renderSettings(); }
</script>
</body>
</html>
