<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wazi 管理系統 V23.8</title>
    <style>
        * { box-sizing: border-box; font-family: "Microsoft JhengHei", sans-serif; }
        body { background: #f4f7f6; margin: 0; padding: 10px; color: #333; font-size: 14px; }
        .container { max-width: 850px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        
        /* 分頁按鈕 3x2 佈局 */
        .tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .tab-btn { padding: 12px 2px; background: #e0e0e0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .tab-btn.active { background: #764ba2; color: white; }
        .tab-btn.refresh-btn { background: #17a2b8; color: white; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 統一日期選擇框樣式 (置中寬版) */
        .date-picker-wrap { background: #e9ecef; border-radius: 10px; padding: 10px; display: flex; justify-content: center; align-items: center; margin-bottom: 12px; }
        .date-picker-wrap input { background: transparent; border: none; font-size: 18px; font-weight: bold; text-align: center; width: 100%; outline: none; cursor: pointer; color: #333; }

        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 11px; color: #777; margin-bottom: 4px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-success { background: #28a745; color: white; }
        .btn-primary { background: #007bff; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-warning { background: #ffc107; color: #212529; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        table th, table td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .section-title { border-left: 4px solid #764ba2; padding-left: 8px; margin: 15px 0 10px; font-size: 15px; font-weight: bold; background: #f9f0ff; padding: 5px; }
        .profit-box { font-size: 20px; font-weight: bold; text-align: center; padding: 15px; background: #333; color: #fff; border-radius: 8px; margin-top: 10px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .stat-card { background: #f8f9fa; border: 1px solid #eee; padding: 10px; border-radius: 8px; text-align: center; }
        .stat-card b { font-size: 15px; color: #764ba2; }
        .total-row { background: #f0f0f0; font-weight: bold; color: #333; }
        .grand-total-row { background: #fff5f5; font-weight: bold; color: #d9534f; }
        .calc-hint { font-size: 11px; color: #d9534f; text-align: right; min-height: 15px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('daily')">每日記帳</button>
        <button class="tab-btn" onclick="switchTab('recon')">對帳中心</button>
        <button class="tab-btn" onclick="switchTab('report')">報表中心</button>
        <button class="tab-btn" onclick="switchTab('monthly')">月結算</button>
        <button class="tab-btn" onclick="switchTab('settings')">設定/資料</button>
        <button class="tab-btn refresh-btn" onclick="location.reload()">🔄 重新整理</button>
    </div>

    <div id="daily" class="tab-content active">
        <div class="date-picker-wrap"><input type="date" id="logDate" onchange="loadDaily()"></div>
        <div class="card">
            <h4 style="margin:0 0 10px;">💰 今日收銀</h4>
            <div class="grid">
                <div class="form-group"><label>千元</label><input type="number" inputmode="decimal" id="c1000" oninput="calcDaily()"></div>
                <div class="form-group"><label>百元</label><input type="number" inputmode="decimal" id="c100" oninput="calcDaily()"></div>
            </div>
            <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
                <div class="form-group"><label>$50重</label><input type="number" inputmode="decimal" id="w50" oninput="calcDaily()"></div>
                <div class="form-group"><label>$10重</label><input type="number" inputmode="decimal" id="w10" oninput="calcDaily()"></div>
                <div class="form-group"><label>$5重</label><input type="number" inputmode="decimal" id="w5" oninput="calcDaily()"></div>
            </div>
            <div class="grid">
                <div class="form-group"><label>網路收入</label><input type="number" inputmode="decimal" id="pOnline" oninput="calcDaily()"></div>
                <div class="form-group"><label>掃碼支付</label><input type="number" inputmode="decimal" id="pScan" oninput="calcDaily()"></div>
            </div>
            <div style="text-align:right; font-size:15px; font-weight:bold; color:#764ba2;">今日營業額: <span id="cSumDisplay">$0</span></div>
        </div>
        <h4 class="section-title">📦 廠商進貨</h4>
        <div id="vDailyArea" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;"></div>
        <button class="btn btn-success" style="margin-top:15px;" onclick="saveDaily()">✅ 儲存今日數據</button>
    </div>

    <div id="recon" class="tab-content">
        <div class="date-picker-wrap"><input type="month" id="reconMonth" onchange="renderRecon()"></div>
        <div style="display: flex; gap: 10px;">
            <div class="card" id="reconVendorList" style="width: 140px; font-size:12px; max-height: 400px; overflow-y: auto; padding:5px;"></div>
            <div id="reconDetailArea" style="flex: 1;"></div>
        </div>
        <div id="reconSummaryArea" class="card" style="display:none; background: #fffbe6;"></div>
        <div id="reconAction" class="card" style="display:none;">
            <h4 style="margin:0 0 5px;">➕ 手動補錄</h4>
            <div class="grid"><input type="number" inputmode="decimal" id="addDay" placeholder="日期(號)"><input type="number" inputmode="decimal" id="addAmt" placeholder="金額"></div>
            <button class="btn btn-primary" onclick="manualUpdateVendorTotal()">確認修改</button>
        </div>
    </div>

    <div id="report" class="tab-content">
        <div class="date-picker-wrap"><input type="month" id="rMonth" onchange="genFullReport()"></div>
        <div id="repArea" style="background: white; border-radius: 8px; padding: 5px;"></div>
    </div>

    <div id="monthly" class="tab-content">
        <div class="date-picker-wrap"><input type="month" id="mMonth" onchange="loadMonthly()"></div>
        <div class="card">
            <h4 class="section-title">抄表結束度數</h4>
            <div class="grid">
                <div class="form-group"><label>總表110</label><input type="number" inputmode="decimal" id="me110" oninput="showLiveCalc('e110')"><div id="hint_e110" class="calc-hint"></div></div>
                <div class="form-group"><label>總表220</label><input type="number" inputmode="decimal" id="me220" oninput="showLiveCalc('e220')"><div id="hint_e220" class="calc-hint"></div></div>
                <div class="form-group"><label>分表110</label><input type="number" inputmode="decimal" id="mse110" oninput="showLiveCalc('se110')"><div id="hint_se110" class="calc-hint"></div></div>
                <div class="form-group"><label>分表220</label><input type="number" inputmode="decimal" id="mse220" oninput="showLiveCalc('se220')"><div id="hint_se220" class="calc-hint"></div></div>
                <div class="form-group"><label>水費抄表</label><input type="number" inputmode="decimal" id="mw" oninput="showLiveCalc('w')"><div id="hint_w" class="calc-hint"></div></div>
                <div class="form-group"><label>瓦斯抄表</label><input type="number" inputmode="decimal" id="mg" oninput="showLiveCalc('g')"><div id="hint_g" class="calc-hint"></div></div>
                <div class="form-group"><label>房租</label><input type="number" inputmode="decimal" id="mrent"></div>
                <div class="form-group"><label>公攤額</label><input type="number" inputmode="decimal" id="mpub"></div>
                <div class="form-group"><label>設備租賃</label><input type="number" inputmode="decimal" id="mlease"></div>
                <div class="form-group"><label>稅金基數</label><input type="number" inputmode="decimal" id="mtaxb"></div>
            </div>
            <button class="btn btn-warning" onclick="manualReplaceStartDegrees()">📍 更新度數為下月起始值</button>
            <h4 class="section-title">👥 薪資獎金</h4>
            <div id="mStaffArea"></div>
            <button class="btn btn-success" style="margin-top:15px;" onclick="saveMonthlyOnly()">💾 儲存本月報表數據</button>
        </div>
    </div>

    <div id="settings" class="tab-content">
        <div class="card">
            <h4 class="section-title">單價與零用金</h4>
            <div class="grid">
                <div class="form-group"><label>電單價</label><input type="number" inputmode="decimal" id="upElec"></div>
                <div class="form-group"><label>水單價</label><input type="number" inputmode="decimal" id="upWater"></div>
                <div class="form-group"><label>瓦斯單價</label><input type="number" inputmode="decimal" id="upGas"></div>
                <div class="form-group"><label>零用金</label><input type="number" inputmode="decimal" id="sPetty"></div>
            </div>
            <h4 class="section-title">當前起始度數</h4>
            <div class="grid">
                <div class="form-group"><label>總110</label><input type="number" inputmode="decimal" id="si110"></div>
                <div class="form-group"><label>總220</label><input type="number" inputmode="decimal" id="si220"></div>
                <div class="form-group"><label>分110</label><input type="number" inputmode="decimal" id="sis110"></div>
                <div class="form-group"><label>分220</label><input type="number" inputmode="decimal" id="sis220"></div>
                <div class="form-group"><label>水始</label><input type="number" inputmode="decimal" id="siw"></div>
                <div class="form-group"><label>瓦斯始</label><input type="number" inputmode="decimal" id="sig"></div>
            </div>
            <button class="btn btn-success" onclick="saveSettings()">💾 儲存基本設定</button>
        </div>
        <div class="card">
            <div id="listStaff"></div><button class="btn btn-primary" onclick="addStaff()">+ 員工</button><hr>
            <div id="listVendor"></div><button class="btn btn-primary" onclick="addVendor()">+ 廠商</button>
        </div>
        <h4 class="section-title">🛠 數據維護</h4>
        <div class="grid">
            <button class="btn btn-primary" onclick="backupData()">📥 備份數據</button>
            <button class="btn btn-danger" onclick="clearAllData()">⚠️ 清空資料</button>
        </div>
    </div>
</div>

<script>
const KEY = "wazi_v23_";
const get = (k)=>JSON.parse(localStorage.getItem(KEY+k)) || [];
const set = (k,v)=>localStorage.setItem(KEY+k, JSON.stringify(v));
const cfg = ()=>JSON.parse(localStorage.getItem(KEY+'cfg')) || {petty:8000, i110:0, i220:0, is110:0, is220:0, iw:0, ig:0, ue:5, uw:12, ug:20};

function initApp(){
    const now = new Date();
    const tzOffset = now.getTimezoneOffset() * 60000;
    const localISO = (new Date(Date.now() - tzOffset)).toISOString();
    document.getElementById('logDate').value = localISO.slice(0, 10);
    document.getElementById('reconMonth').value = localISO.slice(0, 7);
    document.getElementById('rMonth').value = localISO.slice(0, 7);
    document.getElementById('mMonth').value = localISO.slice(0, 7);
    loadDaily(); renderRecon(); loadMonthly();
}

function switchTab(id){
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    const content = document.getElementById(id);
    if(content) content.classList.add('active');
    const btn = document.querySelector(`.tab-btn[onclick*="${id}"]`);
    if(btn) btn.classList.add('active');
    if(id==='report') genFullReport();
    if(id==='monthly') loadMonthly();
    if(id==='settings') renderSettings();
}

function genFullReport(){
    const month = document.getElementById('rMonth').value;
    const m = JSON.parse(localStorage.getItem(KEY+'m_'+month)) || {staff:{}, bonus:{}, e110:0, e220:0, se110:0, se220:0, w:0, g:0, pub:0, rent:0, taxb:0, lease:0};
    const c = cfg();
    
    let dayRows="", tCash=0, tOnline=0, tScan=0, tDays=0, vSum={};
    for(let i=1; i<=31; i++){
        const date = month + '-' + String(i).padStart(2,'0');
        const d = JSON.parse(localStorage.getItem(KEY+'d_'+date));
        if(d){
            const val = (v)=>parseFloat(v)||0;
            const cashOnly = (val(d.c1000)*1000) + (val(d.c100)*100) + (Math.max(0, val(d.w50)-26)*5) + (Math.max(0, val(d.w10)-26)*1.33) + (Math.max(0, val(d.w5)-26)*1.1);
            const cash = cashOnly > 0 ? (cashOnly - c.petty) : 0;
            const dayT = cash + val(d.pOnline) + val(d.pScan);
            if(dayT !== 0) {
                dayRows += `<tr><td>${i}</td><td>$${Math.round(cash).toLocaleString()}</td><td>$${val(d.pOnline).toLocaleString()}</td><td>$${val(d.pScan).toLocaleString()}</td><td>$${Math.round(dayT).toLocaleString()}</td></tr>`;
                tCash += cash; tOnline += val(d.pOnline); tScan += val(d.pScan); tDays++;
            }
            if(d.vs) for(let k in d.vs){
                const p=k.split('_'), amt = p.length===3 ? (parseFloat(d.vs[k])*parseFloat(p[2])) : parseFloat(d.vs[k]);
                vSum[p[0]] = (vSum[p[0]]||0) + amt;
            }
        }
    }
    const tRev = tCash + tOnline + tScan;
    const avgRev = tDays > 0 ? (tRev / tDays) : 0;
    const eNet = (m.e110||c.i110)-c.i110 + (m.e220||c.i220)-c.i220 - ((m.se110||c.is110)-c.is110) - ((m.se220||c.is220)-c.is220);
    const tVendor = Object.values(vSum).reduce((a,b)=>a+b, 0);
    let tFixed = 0;
    const fixedRows = [
        {n:'房租',v:m.rent, raw:`房租`}, {n:'公攤(0.75折)',v:(m.pub||0)*0.75, raw:`公攤($${m.pub||0})`}, {n:'設備',v:m.lease, raw:`設備租賃`},
        {n:'電費',v:eNet*c.ue, raw:`電(${eNet.toFixed(1)}度)`}, {n:'水費',v:((m.w||c.iw)-c.iw)*c.uw, raw:`水(${(m.w||c.iw)-c.iw}度)`},
        {n:'瓦斯',v:((m.g||c.ig)-c.ig)*c.ug, raw:`瓦斯(${(m.g||c.ig)-c.ig}度)`}, {n:'稅金',v:(m.taxb||0)*0.05, raw:`稅金`}
    ].map(f=>{ tFixed += (f.v||0); return `<tr><td colspan="4" style="text-align:left;">${f.raw}</td><td>$${Math.round(f.v||0).toLocaleString()}</td></tr>`; }).join('');

    let tStaff = 0;
    const staffHtml = get('staff').map(s => {
        const h = m.staff?.[s.n]||0, b = m.bonus?.[s.n]||0, total = (h*s.r) * (1 + b/100);
        tStaff += total;
        return `<tr><td>${s.n}</td><td>${h}h</td><td>$${s.r}</td><td>${b}%</td><td>$${Math.round(total).toLocaleString()}</td></tr>`;
    }).join('');

    document.getElementById('repArea').innerHTML = `
        <div class="stat-grid">
            <div class="stat-card">本月營業天數<br><b>${tDays}</b></div>
            <div class="stat-card">平均日營業額<br><b>$${Math.round(avgRev).toLocaleString()}</b></div>
        </div>
        <h4 class="section-title">📅 每日營收細項</h4>
        <table>
            <tr><th>日</th><th>現金</th><th>網路</th><th>掃碼</th><th>總額</th></tr>
            ${dayRows}
            <tr class="total-row"><td>總計</td><td>$${Math.round(tCash).toLocaleString()}</td><td colspan="2">$${Math.round(tOnline+tScan).toLocaleString()}</td><td style="color:#d9534f;">$${Math.round(tRev).toLocaleString()}</td></tr>
        </table>
        <h4 class="section-title">📦 支出明細</h4>
        <table>
            <tr><th colspan="4" style="text-align:left; background:#f0f0f0;">廠商進貨</th><th>金額</th></tr>
            ${Object.keys(vSum).map(vn => `<tr><td colspan="4" style="text-align:left;">${vn}</td><td>$${Math.round(vSum[vn]).toLocaleString()}</td></tr>`).join('')}
            <tr class="grand-total-row"><td colspan="4" style="text-align:left;">廠商進貨總計</td><td>$${Math.round(tVendor).toLocaleString()}</td></tr>
            <tr><th colspan="4" style="text-align:left; background:#f0f0f0; border-top:2px solid #ddd;">固定支出</th><th>金額</th></tr>
            ${fixedRows}
            <tr class="grand-total-row"><td colspan="4" style="text-align:left;">固定支出總計</td><td>$${Math.round(tFixed).toLocaleString()}</td></tr>
        </table>
        <h4 class="section-title">👥 人事成本</h4>
        <table>
            <tr><th>姓名</th><th>工時</th><th>時薪</th><th>獎金</th><th>合計</th></tr>
            ${staffHtml}
            <tr class="grand-total-row"><td colspan="4" style="text-align:left;">人事總計</td><td>$${Math.round(tStaff).toLocaleString()}</td></tr>
        </table>
        <div class="profit-box">本月預計純利：$${Math.round(tRev - tVendor - tFixed - tStaff).toLocaleString()}</div>`;
}

function loadDaily(){
    const date = document.getElementById('logDate').value, d = JSON.parse(localStorage.getItem(KEY+'d_'+date)) || {vs:{}};
    ['c1000','c100','w50','w10','w5','pOnline','pScan'].forEach(f=>document.getElementById(f).value=d[f]||'');
    let html = ""; const vendors = get('vendors');
    vendors.forEach(v => {
        if(v.type==='金額'){ 
            html += `<div class="v-row" style="padding:5px;"><b>${v.name}</b><input type="number" inputmode="decimal" class="vd-input" data-name="${v.name}" value="${d.vs[v.name]||''}" style="width:100%; padding:8px; border-radius:5px; border:1px solid #ccc;"></div>`;
        } else { 
            (v.items||[]).forEach(it => { 
                const key = v.name+'_'+it.n+'_'+it.p; 
                html += `<div class="v-row" style="padding:5px;"><b>${v.name}-${it.n}</b><input type="number" inputmode="decimal" class="vit-qty" data-v="${v.name}" data-n="${it.n}" data-p="${it.p}" value="${d.vs[key]||''}" style="width:100%; padding:8px; border-radius:5px; border:1px solid #ccc;"></div>`; 
            }); 
        }
    });
    document.getElementById('vDailyArea').innerHTML = html || "<p style='grid-column:1/3; color:#999; text-align:center;'>尚未設定廠商</p>";
    calcDaily();
}
function saveDaily(){
    const date = document.getElementById('logDate').value, vs = {};
    document.querySelectorAll('.vd-input').forEach(i => vs[i.dataset.name] = parseFloat(i.value)||0);
    document.querySelectorAll('.vit-qty').forEach(i => vs[i.dataset.v+'_'+i.dataset.n+'_'+i.dataset.p] = parseFloat(i.value)||0);
    set('d_'+date, { c1000:document.getElementById('c1000').value, c100:document.getElementById('c100').value, w50:document.getElementById('w50').value, w10:document.getElementById('w10').value, w5:document.getElementById('w5').value, pOnline:document.getElementById('pOnline').value, pScan:document.getElementById('pScan').value, vs: vs });
    alert('✅ 今日數據儲存成功');
}
function calcDaily(){
    const c = cfg(); const val = (id)=>parseFloat(document.getElementById(id).value) || 0;
    const cash = (val('c1000')*1000) + (val('c100')*100) + (Math.max(0, val('w50')-26)*5) + (Math.max(0, val('w10')-26)*1.33) + (Math.max(0, val('w5')-26)*1.1);
    document.getElementById('cSumDisplay').innerText = `$ ${Math.round(cash-c.petty+val('pOnline')+val('pScan')).toLocaleString()}`;
}
function loadMonthly(){
    const m = JSON.parse(localStorage.getItem(KEY+'m_'+document.getElementById('mMonth').value))||{staff:{}, bonus:{}};
    document.getElementById('mStaffArea').innerHTML = get('staff').map(s=>`<div class="card"><b>${s.n}</b><div class="grid"><div class="form-group"><label>工時</label><input type="number" inputmode="decimal" class="ms-qty" data-n="${s.n}" value="${m.staff?.[s.n]||''}"></div><div class="form-group"><label>獎金%</label><input type="number" inputmode="decimal" class="ms-bonus" data-n="${s.n}" value="${m.bonus?.[s.n]||''}"></div></div></div>`).join('');
    ['e110','e220','se110','se220','w','g','pub','rent','taxb','lease'].forEach(k=>document.getElementById('m'+k).value=m[k]||'');
    ['e110','e220','se110','se220','w','g'].forEach(showLiveCalc);
}
function saveMonthlyOnly(){
    const m = document.getElementById('mMonth').value, s={}, b={};
    document.querySelectorAll('.ms-qty').forEach(i=>s[i.dataset.n]=parseFloat(i.value)||0);
    document.querySelectorAll('.ms-bonus').forEach(i=>b[i.dataset.n]=parseFloat(i.value)||0);
    set('m_'+m, { staff:s, bonus:b, e110:parseFloat(document.getElementById('me110').value)||0, e220:parseFloat(document.getElementById('me220').value)||0, se110:parseFloat(document.getElementById('mse110').value)||0, se220:parseFloat(document.getElementById('mse220').value)||0, w:parseFloat(document.getElementById('mw').value)||0, g:parseFloat(document.getElementById('mg').value)||0, pub:parseFloat(document.getElementById('mpub').value)||0, rent:parseFloat(document.getElementById('mrent').value)||0, taxb:parseFloat(document.getElementById('mtaxb').value)||0, lease:parseFloat(document.getElementById('mlease').value)||0 });
    alert('✅ 報表數據已儲存。');
    switchTab('report');
}
function manualReplaceStartDegrees(){
    if(!confirm("確定要將目前的「結束度數」更新為系統的「起始度數」嗎？")) return;
    const c = cfg();
    c.i110 = parseFloat(document.getElementById('me110').value)||0; c.i220 = parseFloat(document.getElementById('me220').value)||0;
    c.is110 = parseFloat(document.getElementById('mse110').value)||0; c.is220 = parseFloat(document.getElementById('mse220').value)||0;
    c.iw = parseFloat(document.getElementById('mw').value)||0; c.ig = parseFloat(document.getElementById('mg').value)||0;
    set('cfg', c); alert('📍 系統起始度數已同步更新！');
}
function showLiveCalc(type){
    const c = cfg(), cur = parseFloat(document.getElementById('m'+type).value) || 0;
    const startKey = {e110:'i110',e220:'i220',se110:'is110',se220:'is220',w:'iw',g:'ig'}[type];
    const diff = Math.max(0, cur - (c[startKey]||0));
    const amt = diff * (type.includes('e') ? c.ue : (type==='w' ? c.uw : c.ug));
    if(document.getElementById('hint_'+type)) document.getElementById('hint_'+type).innerText = `用量: ${diff.toFixed(1)} | 預估: $${Math.round(amt)}`;
}
function renderSettings(){
    const c = cfg(); const map = {upElec:'ue', upWater:'uw', upGas:'ug', sPetty:'petty', si110:'i110', si220:'i220', sis110:'is110', sis220:'is220', siw:'iw', sig:'ig'};
    Object.keys(map).forEach(id=> { if(document.getElementById(id)) document.getElementById(id).value = c[map[id]]||0; });
    document.getElementById('listStaff').innerHTML = get('staff').map((s,i)=>`<div>${s.n} ($${s.r}) <button onclick="del('staff',${i})">刪</button></div>`).join('');
    document.getElementById('listVendor').innerHTML = get('vendors').map((v,i)=>`<div>${v.name} <button onclick="del('vendors',${i})">刪</button></div>`).join('');
}
function saveSettings(){
    set('cfg', { ue:parseFloat(document.getElementById('upElec').value), uw:parseFloat(document.getElementById('upWater').value), ug:parseFloat(document.getElementById('upGas').value), petty:parseFloat(document.getElementById('sPetty').value), i110:parseFloat(document.getElementById('si110').value), i220:parseFloat(document.getElementById('si220').value), is110:parseFloat(document.getElementById('sis110').value), is220:parseFloat(document.getElementById('sis220').value), iw:parseFloat(document.getElementById('siw').value), ig:parseFloat(document.getElementById('sig').value) });
    alert('設定已儲存');
}
function renderRecon(){
    const vs = get('vendors');
    let html = ""; vs.forEach(v => { html += `<label style="display:block; padding:8px; border-bottom:1px solid #eee;"><input type="checkbox" class="recon-chk" value="${v.name}" onchange="calcRecon()"> ${v.name}</label>`; });
    document.getElementById('reconVendorList').innerHTML = html || "尚未設定廠商";
}
function calcRecon(){
    const chks = document.querySelectorAll('.recon-chk:checked'), month = document.getElementById('reconMonth').value;
    if(chks.length === 0){ document.getElementById('reconDetailArea').innerHTML = "請選廠商"; document.getElementById('reconSummaryArea').style.display = 'none'; document.getElementById('reconAction').style.display = 'none'; return; }
    let selectedNames = Array.from(chks).map(c => c.value), vTots = {}, dayDets = {}, totalAll = 0;
    selectedNames.forEach(n => vTots[n] = 0);
    for(let i=1; i<=31; i++){
        const d = JSON.parse(localStorage.getItem(KEY+'d_'+month+'-'+String(i).padStart(2,'0')));
        if(d && d.vs){
            let dayTotal = 0;
            for(let key in d.vs){
                let owner = selectedNames.find(n => key === n || key.startsWith(n + '_'));
                if(owner){ const p = key.split('_'), val = parseFloat(d.vs[key])||0, amt = (p.length===3?val*parseFloat(p[2]):val); vTots[owner]+=amt; dayTotal+=amt; totalAll+=amt; }
            }
            if(dayTotal > 0) dayDets[i] = dayTotal;
        }
    }
    let tHtml = `<table><tr><th>日期</th><th>金額</th></tr>`;
    Object.keys(dayDets).forEach(day => { tHtml += `<tr><td>${day}號</td><td>$${Math.round(dayDets[day]).toLocaleString()}</td></tr>`; });
    document.getElementById('reconDetailArea').innerHTML = tHtml + `</table>`;
    let sHtml = `<div style="font-weight:bold;">廠商小計</div>`;
    selectedNames.forEach(n => sHtml += `<div style="display:flex;justify-content:space-between;"><span>${n}</span><span>$${Math.round(vTots[n]).toLocaleString()}</span></div>`);
    document.getElementById('reconSummaryArea').innerHTML = sHtml + `<hr><b>總計：$${Math.round(totalAll).toLocaleString()}</b>`;
    document.getElementById('reconSummaryArea').style.display = 'block';
    document.getElementById('reconAction').style.display = (selectedNames.length === 1) ? 'block' : 'none';
}
function manualUpdateVendorTotal(){
    const d = document.getElementById('addDay').value, a = document.getElementById('addAmt').value, vn = document.querySelector('.recon-chk:checked').value;
    const date = document.getElementById('reconMonth').value + '-' + String(d).padStart(2,'0');
    const data = JSON.parse(localStorage.getItem(KEY+'d_'+date)) || {vs:{}};
    for(let k in data.vs) { if(k.startsWith(vn+'_')) delete data.vs[k]; }
    data.vs[vn] = parseFloat(a); set('d_'+date, data); calcRecon(); alert('數據已修正');
}
function addStaff(){ const n=prompt('姓名'); if(n){ const s=get('staff'); s.push({n:n, r:parseFloat(prompt('時薪','190'))}); set('staff',s); renderSettings(); } }
function addVendor(){ const n=prompt('廠商名'); if(n){ const t=confirm('按品項輸入?')?'品項':'金額'; const v=get('vendors'); v.push({name:n, type:t, items:[]}); if(t==='品項'){ let iname; while(iname=prompt('品項名(留空結束)')){ v[v.length-1].items.push({n:iname, p:parseFloat(prompt('單價','0'))}); } } set('vendors',v); renderSettings(); } }
function del(k,i){ const d=get(k); d.splice(i,1); set(k,d); renderSettings(); }
function backupData(){ const d={}; Object.keys(localStorage).forEach(k=>{ if(k.startsWith(KEY)) d[k]=localStorage.getItem(k); }); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(d)],{type:'application/json'})); a.download=`Wazi_Backup.json`; a.click(); }
function clearAllData(){ if(confirm('⚠️ 確定清空所有資料？無法復原！')){ localStorage.clear(); location.reload(); } }
window.addEventListener('load', initApp);
</script>
