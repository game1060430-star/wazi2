<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wazi 旗艦管理系統 17.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #f4f7f6; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        
        /* 分頁改為兩列 */
        .tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .tab-btn { padding: 12px 5px; background: #e0e0e0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .tab-btn.active { background: #764ba2; color: white; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 11px; color: #777; margin-bottom: 4px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-success { background: #28a745; color: white; }
        .btn-primary { background: #007bff; color: white; }
        .btn-danger { background: #dc3545; color: white; padding: 5px; font-size: 12px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        table th, table td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .section-title { border-left: 4px solid #764ba2; padding-left: 8px; margin: 15px 0 10px; font-size: 15px; font-weight: bold; background: #f9f0ff; padding: 5px; }
        .vendor-card { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 8px; margin-bottom: 5px; }
        .price-tag { color: #d63384; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('daily')">每日記帳</button>
        <button class="tab-btn" onclick="switchTab('recon')">對帳中心</button>
        <button class="tab-btn" onclick="switchTab('report')">報表中心</button>
        <button class="tab-btn" onclick="switchTab('monthly')">月結算</button>
        <button class="tab-btn" onclick="switchTab('settings')">系統設定</button>
        <button class="tab-btn" onclick="switchTab('data')">資料管理</button>
    </div>

    <div id="daily" class="tab-content active">
        <div class="card"><input type="date" id="logDate" onchange="loadDaily()" style="width:100%; border:none; font-size:18px; font-weight:bold; text-align:center;"></div>
        <div class="card">
            <h4 style="margin:0 0 10px;">💰 今日收銀</h4>
            <div class="grid">
                <div class="form-group"><label>千元(張)</label><input type="number" id="c1000" oninput="calcDaily()"></div>
                <div class="form-group"><label>百元(張)</label><input type="number" id="c100" oninput="calcDaily()"></div>
            </div>
            <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
                <div class="form-group"><label>$50重量</label><input type="number" id="w50" oninput="calcDaily()"></div>
                <div class="form-group"><label>$10重量</label><input type="number" id="w10" oninput="calcDaily()"></div>
                <div class="form-group"><label>$5重量</label><input type="number" id="w5" oninput="calcDaily()"></div>
            </div>
            <div class="grid">
                <div class="form-group"><label>網路收入</label><input type="number" id="pOnline" oninput="calcDaily()"></div>
                <div class="form-group"><label>掃碼支付</label><input type="number" id="pScan" oninput="calcDaily()"></div>
            </div>
            <div style="text-align:right; font-size:15px; font-weight:bold; color:#764ba2;">今日營業額: <span id="cSumDisplay">$0</span></div>
        </div>
        <h4 class="section-title">📦 廠商進貨</h4>
        <div id="vDailyArea" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;"></div>
        <button class="btn btn-success" onclick="saveDaily()">✅ 儲存今日數據</button>
    </div>

    <div id="recon" class="tab-content">
        <div class="card"><input type="month" id="reconMonth" onchange="renderRecon()"></div>
        <div style="display: flex; gap: 10px;">
            <div class="card" id="reconVendorList" style="width: 130px; font-size: 13px;"></div>
            <div id="reconDetailArea" style="flex: 1;"></div>
        </div>
        <div id="reconSummaryArea" class="card" style="display:none; background: #fffbe6;"></div>
    </div>

    <div id="report" class="tab-content">
        <div class="card"><input type="month" id="rMonth" onchange="genFullReport()"></div>
        <div id="repArea" style="background:white; padding:15px; border:1px solid #ccc; display:none;"></div>
        <button class="btn btn-primary" style="margin-top:10px;" onclick="exportPDF()">📥 輸出 PDF 報表</button>
    </div>

    <div id="monthly" class="tab-content">
        <div class="card"><input type="month" id="mMonth" onchange="loadMonthly()"></div>
        <div class="card">
            <h4 style="margin:0 0 10px;">營運支出錄入 (填寫本月抄表值)</h4>
            <div class="grid">
                <div class="form-group"><label>總表 110V</label><input type="number" id="me110"></div>
                <div class="form-group"><label>總表 220V</label><input type="number" id="me220"></div>
                <div class="form-group"><label>分表 110V</label><input type="number" id="mse110"></div>
                <div class="form-group"><label>分表 220V</label><input type="number" id="mse220"></div>
                <div class="form-group"><label>水費 抄表</label><input type="number" id="mw"></div>
                <div class="form-group"><label>瓦斯 抄表</label><input type="number" id="mg"></div>
                <div class="form-group"><label>店面租金</label><input type="number" id="mrent"></div>
                <div class="form-group"><label>公攤費</label><input type="number" id="mpub"></div>
                <div class="form-group"><label>設備租賃</label><input type="number" id="mlease"></div>
                <div class="form-group"><label>稅金基數</label><input type="number" id="mtaxb"></div>
            </div>
            <h4 class="section-title">👥 人事薪資與獎金</h4>
            <div id="mStaffArea"></div>
            <button class="btn btn-success" onclick="saveMonthlyAndGo()">🚀 送出並產生報表</button>
        </div>
    </div>

    <div id="settings" class="tab-content">
        <div class="section-title">⚡ 能源單價與零用金</div>
        <div class="card">
            <div class="grid">
                <div class="form-group"><label>電單價(度)</label><input type="number" id="upElec"></div>
                <div class="form-group"><label>水單價(度)</label><input type="number" id="upWater"></div>
                <div class="form-group"><label>瓦斯單價</label><input type="number" id="upGas"></div>
                <div class="form-group"><label>開店零用金</label><input type="number" id="sPetty"></div>
            </div>
        </div>
        
        <div class="section-title">📟 抄表起始值 (上月結尾值)</div>
        <div class="card">
            <div class="grid">
                <div class="form-group"><label>總110起始</label><input type="number" id="si110"></div>
                <div class="form-group"><label>總220起始</label><input type="number" id="si220"></div>
                <div class="form-group"><label>分110起始</label><input type="number" id="sis110"></div>
                <div class="form-group"><label>分220起始</label><input type="number" id="sis220"></div>
                <div class="form-group"><label>水起始值</label><input type="number" id="siw"></div>
                <div class="form-group"><label>瓦斯起始值</label><input type="number" id="sig"></div>
            </div>
        </div>

        <div class="section-title">👥 人員與廠商名單</div>
        <div class="card">
            <div id="listStaff"></div><button class="btn btn-primary" onclick="addStaff()">+ 新增員工</button>
            <hr>
            <div id="listVendor"></div><button class="btn btn-primary" onclick="addVendor()">+ 新增廠商</button>
        </div>
        <button class="btn btn-success" onclick="saveSettings()">💾 儲存所有設定</button>
    </div>

    <div id="data" class="tab-content">
        <div class="card">
            <button class="btn btn-primary" onclick="backupData()">📥 備份數據</button>
            <button class="btn btn-danger" onclick="clearAllData()">⚠️ 清空數據</button>
        </div>
    </div>
</div>

<script>
const KEY = "w17_";
const get = (k)=>JSON.parse(localStorage.getItem(KEY+k)) || [];
const set = (k,v)=>localStorage.setItem(KEY+k, JSON.stringify(v));
const cfg = ()=>JSON.parse(localStorage.getItem(KEY+'cfg')) || {petty:8000, i110:0, i220:0, is110:0, is220:0, iw:0, ig:0, ue:5, uw:12, ug:20};

document.getElementById('logDate').valueAsDate = new Date();
const currentMonth = new Date().toISOString().slice(0, 7);
['rMonth','mMonth','reconMonth'].forEach(id=>document.getElementById(id).value = currentMonth);

function switchTab(id){
    document.querySelectorAll('.tab-content, .tab-btn').forEach(el=>el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    const targetBtn = document.querySelector(`.tab-btn[onclick*="${id}"]`);
    if(targetBtn) targetBtn.classList.add('active');
    if(id==='daily') loadDaily();
    if(id==='recon') renderRecon();
    if(id==='report') genFullReport();
    if(id==='monthly') loadMonthly();
    if(id==='settings') renderSettings();
}

// 每日記帳
function calcDaily(){
    const c = cfg();
    const val = (id)=>parseFloat(document.getElementById(id).value) || 0;
    const cashTotal = (val('c1000')*1000) + (val('c100')*100) + (Math.max(0, val('w50')-26)*5) + (Math.max(0, val('w10')-26)*1.33) + (Math.max(0, val('w5')-26)*1.1);
    const rev = (cashTotal - c.petty) + val('pOnline') + val('pScan');
    document.getElementById('cSumDisplay').innerText = `$ ${Math.round(rev).toLocaleString()}`;
}

function loadDaily(){
    const date = document.getElementById('logDate').value;
    const d = JSON.parse(localStorage.getItem('d_'+date)) || {vs:{}};
    ['c1000','c100','w50','w10','w5','pOnline','pScan'].forEach(f=>document.getElementById(f).value=d[f]||'');
    const vendors = get('vendors');
    document.getElementById('vDailyArea').innerHTML = vendors.map(v => {
        let inputHtml = (v.type==='金額') ? `<input type="number" class="vd-input" data-name="${v.name}" value="${d.vs[v.name]||''}" placeholder="金額">` : 
            (v.items||[]).map(it => {
                const key = v.name+'_'+it.n+'_'+it.p;
                return `<div style="font-size:11px; margin-top:5px;">${it.n}($${it.p})</div>
                <div style="display:flex; align-items:center; gap:5px;">
                    <input type="number" class="vit-qty" data-v="${v.name}" data-n="${it.n}" data-p="${it.p}" oninput="uS('${v.name}','${it.n}',${it.p}, this)" value="${d.vs[key]||''}" placeholder="數量">
                    <span class="price-tag" id="sub_${v.name}_${it.n}">$${Math.round((d.vs[key]||0)*it.p)}</span>
                </div>`;
            }).join('');
        return `<div class="vendor-card"><b>${v.name}</b>${inputHtml}</div>`;
    }).join('');
    calcDaily();
}
function uS(v,n,p,i){ document.getElementById(`sub_${v}_${n}`).innerText=`$${Math.round((parseFloat(i.value)||0)*p)}`; }

function saveDaily(){
    const date = document.getElementById('logDate').value;
    const vs = {};
    document.querySelectorAll('.vd-input').forEach(i => vs[i.dataset.name] = parseFloat(i.value)||0);
    document.querySelectorAll('.vit-qty').forEach(i => vs[i.dataset.v+'_'+i.dataset.n+'_'+i.dataset.p] = parseFloat(i.value)||0);
    localStorage.setItem('d_'+date, JSON.stringify({ c1000:document.getElementById('c1000').value, c100:document.getElementById('c100').value, w50:document.getElementById('w50').value, w10:document.getElementById('w10').value, w5:document.getElementById('w5').value, pOnline:document.getElementById('pOnline').value, pScan:document.getElementById('pScan').value, vs: vs }));
    alert('儲存成功');
}

// 報表中心
function genFullReport(){
    const month = document.getElementById('rMonth').value;
    const m = JSON.parse(localStorage.getItem('m_'+month)) || {staff:{}, bonus:{}};
    const c = cfg();
    let tCashAll = 0, tPayAll = 0, tDays = 0, vSum = {};

    for(let i=1; i<=31; i++){
        const date = month + '-' + String(i).padStart(2,'0');
        const d = JSON.parse(localStorage.getItem('d_'+date));
        if(d){
            const val = (v)=>parseFloat(v)||0;
            tCashAll += (val(d.c1000)*1000) + (val(d.c100)*100) + (Math.max(0, val(d.w50)-26)*5) + (Math.max(0, val(d.w10)-26)*1.33) + (Math.max(0, val(d.w5)-26)*1.1) - c.petty;
            tPayAll += val(d.pOnline) + val(d.pScan);
            tDays++;
            if(d.vs) for(let k in d.vs){
                const p = k.split('_'), amt = p.length===3 ? (val(d.vs[k])*parseFloat(p[2])) : val(d.vs[k]);
                vSum[p[0]] = (vSum[p[0]]||0) + amt;
            }
        }
    }
    if(tDays === 0) { document.getElementById('repArea').innerHTML = "本月無數據"; return; }

    const tVendor = Object.values(vSum).reduce((a,b)=>a+b, 0);
    const eUse = ((m.e110||c.i110)-c.i110)+((m.e220||c.i220)-c.i220)-((m.se110||c.is110)-c.is110)-((m.se220||c.is220)-c.is220);
    const fixedItems = [
        {n:'店面租金', v:m.rent||0}, {n:'大樓公攤', v:m.pub||0}, {n:'設備租賃', v:m.lease||0},
        {n:`店電力(${Math.round(eUse)}度)`, v:eUse*c.ue}, {n:'水費', v:((m.w||c.iw)-c.iw)*c.uw},
        {n:'瓦斯費', v:((m.g||c.ig)-c.ig)*c.ug}, {n:'預估營業稅', v:(m.taxb||0)*0.05}
    ];
    const tFixed = fixedItems.reduce((a,b)=>a+b.v, 0);
    const tStaff = get('staff').reduce((sum,s)=>sum + ((m.staff?.[s.n]||0)*s.r) + (m.bonus?.[s.n]||0), 0);
    const tRev = tCashAll + tPayAll;

    document.getElementById('repArea').style.display = 'block';
    document.getElementById('repArea').innerHTML = `
        <h3 style="text-align:center;">Wazi ${month} 營運報表</h3>
        <div class="section-title">💰 營收統計</div>
        <table><tr><td>總營業額</td><td>$${Math.round(tRev).toLocaleString()}</td></tr><tr><td>均日營收 (${tDays}天)</td><td>$${Math.round(tRev/tDays).toLocaleString()}</td></tr></table>
        <div class="section-title">📦 廠商月帳總覽</div>
        <table><tr><th>廠商</th><th>月進貨總額</th></tr>${Object.keys(vSum).map(vn=>`<tr><td>${vn}</td><td>$${Math.round(vSum[vn]).toLocaleString()}</td></tr>`).join('')}<tr style="background:#eee;font-weight:bold;"><td>廠商合計</td><td>$${Math.round(tVendor).toLocaleString()}</td></tr></table>
        <div class="section-title">⚡ 固定與能源細目</div>
        <table><tr><th>項目</th><th>細目金額</th></tr>${fixedItems.map(f=>`<tr><td>${f.n}</td><td>$${Math.round(f.v).toLocaleString()}</td></tr>`).join('')}<tr style="background:#eee;font-weight:bold;"><td>固定合計</td><td>$${Math.round(tFixed).toLocaleString()}</td></tr></table>
        <div class="section-title">👥 人事總計：$${Math.round(tStaff).toLocaleString()}</div>
        <div style="font-size:24px; text-align:center; padding:20px; background:#000; color:white; border-radius:10px; margin-top:15px;">本月淨利：$${Math.round(tRev - tVendor - tFixed - tStaff).toLocaleString()}</div>`;
}

// 系統設定 - 顯示與儲存
function renderSettings(){
    const c = cfg();
    document.getElementById('upElec').value = c.ue; document.getElementById('upWater').value = c.uw; document.getElementById('upGas').value = c.ug; document.getElementById('sPetty').value = c.petty;
    document.getElementById('si110').value = c.i110; document.getElementById('si220').value = c.i220; document.getElementById('sis110').value = c.is110; document.getElementById('sis220').value = c.is220;
    document.getElementById('siw').value = c.iw; document.getElementById('sig').value = c.ig;
    
    document.getElementById('listStaff').innerHTML = get('staff').map((s,i)=>`<div style="margin-bottom:5px;">${s.n}($${s.r}) <button class="btn-danger" onclick="del('staff',${i})">刪除</button></div>`).join('');
    document.getElementById('listVendor').innerHTML = get('vendors').map((v,i)=>`<div class="card"><b>${v.name}</b> <button class="btn-danger" onclick="del('vendors',${i})">刪除</button>
        ${v.type==='品項' ? `<div><input id="itn${i}" placeholder="品名"><input id="itp${i}" placeholder="單價"><button onclick="addItem(${i})">加</button></div><div>${(v.items||[]).map((it,ii)=>`${it.n}($${it.p})`).join(',')}</div>` : ''}</div>`).join('');
}

function saveSettings(){
    const c = {
        ue: parseFloat(document.getElementById('upElec').value)||0,
        uw: parseFloat(document.getElementById('upWater').value)||0,
        ug: parseFloat(document.getElementById('upGas').value)||0,
        petty: parseFloat(document.getElementById('sPetty').value)||0,
        i110: parseFloat(document.getElementById('si110').value)||0,
        i220: parseFloat(document.getElementById('si220').value)||0,
        is110: parseFloat(document.getElementById('sis110').value)||0,
        is220: parseFloat(document.getElementById('sis220').value)||0,
        iw: parseFloat(document.getElementById('siw').value)||0,
        ig: parseFloat(document.getElementById('sig').value)||0
    };
    set('cfg', c); alert('設定儲存成功！');
}

// 其餘功能 (對帳、月結等)
function renderRecon(){
    const vendors = get('vendors');
    document.getElementById('reconVendorList').innerHTML = vendors.map(v=>`<div style="margin-bottom:8px;"><input type="checkbox" class="recon-chk" value="${v.name}" onchange="updateRecon()"> ${v.name}</div>`).join('');
    updateRecon();
}
function updateRecon(){
    const month = document.getElementById('reconMonth').value, selected = Array.from(document.querySelectorAll('.recon-chk:checked')).map(el=>el.value);
    const detailArea = document.getElementById('reconDetailArea'), summaryArea = document.getElementById('reconSummaryArea');
    if(!selected.length){ detailArea.innerHTML='<div class="card">請勾選左側廠商</div>'; summaryArea.style.display='none'; return; }
    let detailHtml="", sumMap={}, gTotal=0;
    selected.forEach(vn=>{
        sumMap[vn]=0; let rows="";
        for(let i=1;i<=31;i++){
            const date = month+'-'+String(i).padStart(2,'0'), d = JSON.parse(localStorage.getItem('d_'+date));
            if(d && d.vs) for(let k in d.vs){
                if(k.startsWith(vn)){
                    const val=parseFloat(d.vs[k])||0, p=k.split('_'), amt = p.length===3 ? (val*parseFloat(p[2])) : val;
                    if(val>0){ rows+=`<tr><td>${i}號</td><td>${p[1]||'總額'}</td><td><input type="number" style="width:50px" value="${val}" onchange="qU('${date}','${k}',this.value)"></td><td>$${Math.round(amt)}</td></tr>`; sumMap[vn]+=amt; }
                }
            }
        }
        detailHtml+=`<div class="card"><b>${vn}</b><table>${rows||'<tr><td>無數據</td></tr>'}</table></div>`;
        gTotal+=sumMap[vn];
    });
    detailArea.innerHTML=detailHtml; summaryArea.style.display='block';
    summaryArea.innerHTML=`<b>統計彙總</b><table>${Object.keys(sumMap).map(k=>`<tr><td>${k}</td><td>$${Math.round(sumMap[k]).toLocaleString()}</td></tr>`).join('')}<tr style="background:#ddd;font-weight:bold;"><td>總計</td><td>$${Math.round(gTotal).toLocaleString()}</td></tr></table>`;
}
function qU(d,k,v){ const data=JSON.parse(localStorage.getItem('d_'+d)); data.vs[k]=parseFloat(v); localStorage.setItem('d_'+d, JSON.stringify(data)); updateRecon(); }

function loadMonthly(){
    const m = JSON.parse(localStorage.getItem('m_'+document.getElementById('mMonth').value))||{staff:{}, bonus:{}};
    document.getElementById('mStaffArea').innerHTML = get('staff').map(s=>`<div class="card"><b>${s.n}</b><div class="grid"><div class="form-group"><label>工時</label><input type="number" class="ms-qty" data-n="${s.n}" value="${m.staff?.[s.n]||''}"></div><div class="form-group"><label>獎金</label><input type="number" class="ms-bonus" data-n="${s.n}" value="${m.bonus?.[s.n]||''}"></div></div></div>`).join('');
    ['e110','e220','se110','se220','w','g','pub','rent','taxb','lease'].forEach(k=>document.getElementById('m'+k).value=m[k]||'');
}
function saveMonthlyAndGo(){
    const s={}, b={}; document.querySelectorAll('.ms-qty').forEach(i=>s[i.dataset.n]=parseFloat(i.value)||0); document.querySelectorAll('.ms-bonus').forEach(i=>b[i.dataset.n]=parseFloat(i.value)||0);
    set('m_'+document.getElementById('mMonth').value, { staff:s, bonus:b, e110:parseFloat(document.getElementById('me110').value), e220:parseFloat(document.getElementById('me220').value), se110:parseFloat(document.getElementById('mse110').value), se220:parseFloat(document.getElementById('mse220').value), w:parseFloat(document.getElementById('mw').value), g:parseFloat(document.getElementById('mg').value), pub:parseFloat(document.getElementById('mpub').value), rent:parseFloat(document.getElementById('mrent').value), taxb:parseFloat(document.getElementById('mtaxb').value), lease:parseFloat(document.getElementById('mlease').value) });
    switchTab('report');
}
function addStaff(){ const n=prompt('姓名'); if(n) { const s=get('staff'); s.push({n:n, r:parseFloat(prompt('時薪','190'))}); set('staff',s); renderSettings(); } }
function addVendor(){ const n=prompt('廠商名'); if(n) { const t=confirm('品項輸入?')?'品項':'金額'; const v=get('vendors'); v.push({name:n, type:t, items:[]}); set('vendors',v); renderSettings(); } }
function addItem(vi){ const v=get('vendors'), n=document.getElementById('itn'+vi).value, p=parseFloat(document.getElementById('itp'+vi).value); if(n&&p){ v[vi].items.push({n:n,p:p}); set('vendors',v); renderSettings(); } }
function del(k,i){ const d=get(k); d.splice(i,1); set(k,d); renderSettings(); }
async function exportPDF(){ const c=await html2canvas(document.getElementById('repArea')); const p=new jspdf.jsPDF(); p.addImage(c.toDataURL('image/png'),'PNG',10,10,190,0); p.save(`Wazi.pdf`); }
function backupData(){ const data={}; for(let i=0; i<localStorage.length; i++){ const k=localStorage.key(i); if(k.includes(KEY)||k.includes('d_')||k.includes('m_')) data[k]=localStorage.getItem(k); } const blob=new Blob([JSON.stringify(data)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`Wazi_Backup.json`; a.click(); }
function clearAllData(){ if(confirm('清空所有營運數據?')){ for(let i=localStorage.length-1;i>=0;i--){ const k=localStorage.key(i); if(k.startsWith('d_')||k.startsWith('m_')) localStorage.removeItem(k); } location.reload(); } }
</script>
