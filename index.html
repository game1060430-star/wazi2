<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wazi 旗艦管理系統 20.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #f4f7f6; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .tab-btn { padding: 12px 5px; background: #e0e0e0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .tab-btn.active { background: #764ba2; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 11px; color: #777; margin-bottom: 4px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-success { background: #28a745; color: white; }
        .btn-primary { background: #007bff; color: white; }
        .btn-danger { background: #dc3545; color: white; padding: 4px 8px; font-size: 11px; border-radius: 4px; border:none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        table th, table td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .section-title { border-left: 4px solid #764ba2; padding-left: 8px; margin: 15px 0 10px; font-size: 15px; font-weight: bold; background: #f9f0ff; padding: 5px; }
        #vDailyArea { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .v-row { display: flex; align-items: center; justify-content: space-between; padding: 8px; background: #fff; border: 1px solid #eee; border-radius: 8px; }
        .v-row b { font-size: 12px; flex: 1; word-break: break-all; margin-right: 5px; }
        .v-row input { width: 70px; padding: 8px; border: 1px solid #ccc; border-radius: 6px; text-align: center; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('daily')">每日記帳</button>
        <button class="tab-btn" onclick="switchTab('recon')">對帳中心</button>
        <button class="tab-btn" onclick="switchTab('report')">報表中心</button>
        <button class="tab-btn" onclick="switchTab('monthly')">月結算</button>
        <button class="tab-btn" onclick="switchTab('settings')">系統設定</button>
        <button class="tab-btn" onclick="switchTab('data')">資料管理</button>
    </div>

    <div id="daily" class="tab-content active">
        <div class="card"><input type="date" id="logDate" onchange="loadDaily()" style="width:100%; border:none; font-size:18px; font-weight:bold; text-align:center;"></div>
        <div class="card">
            <h4 style="margin:0 0 10px;">💰 今日收銀</h4>
            <div class="grid">
                <div class="form-group"><label>千元</label><input type="number" id="c1000" oninput="calcDaily()"></div>
                <div class="form-group"><label>百元</label><input type="number" id="c100" oninput="calcDaily()"></div>
            </div>
            <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
                <div class="form-group"><label>$50重</label><input type="number" id="w50" oninput="calcDaily()"></div>
                <div class="form-group"><label>$10重</label><input type="number" id="w10" oninput="calcDaily()"></div>
                <div class="form-group"><label>$5重</label><input type="number" id="w5" oninput="calcDaily()"></div>
            </div>
            <div class="grid">
                <div class="form-group"><label>網路收入</label><input type="number" id="pOnline" oninput="calcDaily()"></div>
                <div class="form-group"><label>掃碼支付</label><input type="number" id="pScan" oninput="calcDaily()"></div>
            </div>
            <div style="text-align:right; font-size:15px; font-weight:bold; color:#764ba2;">今日營業額: <span id="cSumDisplay">$0</span></div>
        </div>
        <h4 class="section-title">📦 廠商進貨 (兩兩並排)</h4>
        <div id="vDailyArea"></div>
        <button class="btn btn-success" style="margin-top:15px;" onclick="saveDaily()">✅ 儲存今日數據</button>
    </div>

    <div id="recon" class="tab-content">
        <div class="card"><input type="month" id="reconMonth" onchange="renderRecon()"></div>
        <div style="display: flex; gap: 10px;">
            <div class="card" id="reconVendorList" style="width: 120px; font-size:12px;"></div>
            <div id="reconDetailArea" style="flex: 1;"></div>
        </div>
        <div id="reconSummaryArea" class="card" style="display:none; background: #fffbe6;"></div>
        <div id="reconAction" class="card" style="display:none;">
            <h4 style="margin:0 0 5px;">➕ 補錄/修改</h4>
            <div class="grid"><input type="number" id="addDay" placeholder="日期"><input type="number" id="addAmt" placeholder="金額/數量"></div>
            <button class="btn btn-primary" onclick="manualAddVendorData()">新增此筆到勾選廠商</button>
        </div>
    </div>

    <div id="report" class="tab-content">
        <div class="card"><input type="month" id="rMonth" onchange="genFullReport()"></div>
        <div id="repArea" style="background:white; padding:15px; border:1px solid #ccc; display:none;"></div>
        <button class="btn btn-primary" style="margin-top:10px;" onclick="exportPDF()">📥 輸出 PDF 報表</button>
    </div>

    <div id="monthly" class="tab-content">
        <div class="card"><input type="month" id="mMonth" onchange="loadMonthly()"></div>
        <div class="card">
            <h4 style="margin:0 0 10px;">營運支出錄入</h4>
            <div class="grid">
                <div class="form-group"><label>總表110</label><input type="number" id="me110"></div>
                <div class="form-group"><label>總表220</label><input type="number" id="me220"></div>
                <div class="form-group"><label>分表110</label><input type="number" id="mse110"></div>
                <div class="form-group"><label>分表220</label><input type="number" id="mse220"></div>
                <div class="form-group"><label>水費抄表</label><input type="number" id="mw"></div>
                <div class="form-group"><label>瓦斯抄表</label><input type="number" id="mg"></div>
                <div class="form-group"><label>租金</label><input type="number" id="mrent"></div>
                <div class="form-group"><label>公攤費</label><input type="number" id="mpub"></div>
                <div class="form-group"><label>設備租賃</label><input type="number" id="mlease"></div>
                <div class="form-group"><label>稅金基數</label><input type="number" id="mtaxb"></div>
            </div>
            <div id="mStaffArea"></div>
            <button class="btn btn-success" onclick="saveMonthlyAndGo()">🚀 送出並同步報表</button>
        </div>
    </div>

    <div id="settings" class="tab-content">
        <div class="card">
            <div class="grid">
                <div class="form-group"><label>電單價</label><input type="number" id="upElec"></div>
                <div class="form-group"><label>水單價</label><input type="number" id="upWater"></div>
                <div class="form-group"><label>瓦斯單價</label><input type="number" id="upGas"></div>
                <div class="form-group"><label>零用金</label><input type="number" id="sPetty"></div>
            </div>
        </div>
        <div class="card">
            <div class="grid">
                <div class="form-group"><label>總110始</label><input type="number" id="si110"></div>
                <div class="form-group"><label>總220始</label><input type="number" id="si220"></div>
                <div class="form-group"><label>分110始</label><input type="number" id="sis110"></div>
                <div class="form-group"><label>分220始</label><input type="number" id="sis220"></div>
                <div class="form-group"><label>水起始</label><input type="number" id="siw"></div>
                <div class="form-group"><label>瓦斯起始</label><input type="number" id="sig"></div>
            </div>
        </div>
        <div class="card">
            <h4 class="section-title">👥 人員管理</h4>
            <div id="listStaff"></div><button class="btn btn-primary" onclick="addStaff()">+ 新增員工</button>
            <hr>
            <h4 class="section-title">📦 廠商與品項設定</h4>
            <div id="listVendor"></div><button class="btn btn-primary" onclick="addVendor()">+ 新增廠商</button>
        </div>
        <button class="btn btn-success" onclick="saveSettings()">💾 儲存所有設定</button>
    </div>

    <div id="data" class="tab-content"><div class="card"><button class="btn btn-primary" onclick="backupData()">📥 備份數據</button><button class="btn btn-danger" onclick="clearAllData()">⚠️ 清空數據</button></div></div>
</div>

<script>
const KEY = "w20_";
const get = (k)=>JSON.parse(localStorage.getItem(KEY+k)) || [];
const set = (k,v)=>localStorage.setItem(KEY+k, JSON.stringify(v));
const cfg = ()=>JSON.parse(localStorage.getItem(KEY+'cfg')) || {petty:8000, i110:0, i220:0, is110:0, is220:0, iw:0, ig:0, ue:5, uw:12, ug:20};

document.getElementById('logDate').valueAsDate = new Date();
const curMonth = new Date().toISOString().slice(0, 7);
['rMonth','mMonth','reconMonth'].forEach(id=>document.getElementById(id).value = curMonth);

function switchTab(id){
    document.querySelectorAll('.tab-content, .tab-btn').forEach(el=>el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    const btn = document.querySelector(`.tab-btn[onclick*="${id}"]`);
    if(btn) btn.classList.add('active');
    if(id==='daily') loadDaily();
    if(id==='recon') renderRecon();
    if(id==='report') genFullReport();
    if(id==='monthly') loadMonthly();
    if(id==='settings') renderSettings();
}

// 1. 每日記帳
function calcDaily(){
    const c = cfg();
    const val = (id)=>parseFloat(document.getElementById(id).value) || 0;
    const cash = (val('c1000')*1000) + (val('c100')*100) + (Math.max(0, val('w50')-26)*5) + (Math.max(0, val('w10')-26)*1.33) + (Math.max(0, val('w5')-26)*1.1);
    const rev = (cash - c.petty) + val('pOnline') + val('pScan');
    document.getElementById('cSumDisplay').innerText = `$ ${Math.round(rev).toLocaleString()}`;
}

function loadDaily(){
    const date = document.getElementById('logDate').value;
    const d = JSON.parse(localStorage.getItem(KEY+'d_'+date)) || {vs:{}};
    ['c1000','c100','w50','w10','w5','pOnline','pScan'].forEach(f=>document.getElementById(f).value=d[f]||'');
    const vendors = get('vendors');
    let html = "";
    vendors.forEach(v => {
        if(v.type==='金額'){
            html += `<div class="v-row"><b>${v.name}</b><input type="number" class="vd-input" data-name="${v.name}" value="${d.vs[v.name]||''}"></div>`;
        } else {
            (v.items||[]).forEach(it => {
                const key = v.name+'_'+it.n+'_'+it.p;
                html += `<div class="v-row"><b>${v.name}-${it.n}</b><input type="number" class="vit-qty" data-v="${v.name}" data-n="${it.n}" data-p="${it.p}" value="${d.vs[key]||''}"></div>`;
            });
        }
    });
    document.getElementById('vDailyArea').innerHTML = html;
    calcDaily();
}

function saveDaily(){
    const date = document.getElementById('logDate').value;
    const vs = {};
    document.querySelectorAll('.vd-input').forEach(i => vs[i.dataset.name] = parseFloat(i.value)||0);
    document.querySelectorAll('.vit-qty').forEach(i => vs[i.dataset.v+'_'+i.dataset.n+'_'+i.dataset.p] = parseFloat(i.value)||0);
    const data = { c1000:document.getElementById('c1000').value, c100:document.getElementById('c100').value, w50:document.getElementById('w50').value, w10:document.getElementById('w10').value, w5:document.getElementById('w5').value, pOnline:document.getElementById('pOnline').value, pScan:document.getElementById('pScan').value, vs: vs };
    localStorage.setItem(KEY+'d_'+date, JSON.stringify(data)); alert('今日記帳已儲存');
}

// 2. 對帳中心
function renderRecon(){
    const vendors = get('vendors');
    document.getElementById('reconVendorList').innerHTML = vendors.map(v=>`<div style="margin-bottom:8px;"><input type="checkbox" class="recon-chk" value="${v.name}" onchange="updateRecon()"> ${v.name}</div>`).join('');
    updateRecon();
}
function updateRecon(){
    const month = document.getElementById('reconMonth').value, selected = Array.from(document.querySelectorAll('.recon-chk:checked')).map(el=>el.value);
    const detailArea = document.getElementById('reconDetailArea'), summaryArea = document.getElementById('reconSummaryArea'), actionArea = document.getElementById('reconAction');
    if(!selected.length){ detailArea.innerHTML='<div class="card">請勾選廠商</div>'; summaryArea.style.display='none'; actionArea.style.display='none'; return; }
    actionArea.style.display='block';
    let detailHtml="", sumMap={}, gTotal=0;
    selected.forEach(vn=>{
        sumMap[vn]=0; let rows="";
        for(let i=1;i<=31;i++){
            const date = month+'-'+String(i).padStart(2,'0'), d = JSON.parse(localStorage.getItem(KEY+'d_'+date));
            if(d && d.vs) for(let k in d.vs){
                if(k.startsWith(vn)){
                    const val=parseFloat(d.vs[k])||0, p=k.split('_'), amt = p.length===3 ? (val*parseFloat(p[2])) : val;
                    if(val>0){ rows+=`<tr><td>${i}號</td><td><input type="number" style="width:50px" value="${val}" onchange="qU('${date}','${k}',this.value)"></td><td>$${Math.round(amt)}</td><td><button class="btn-danger" onclick="qD('${date}','${k}')">刪</button></td></tr>`; sumMap[vn]+=amt; }
                }
            }
        }
        detailHtml+=`<div class="card"><b>${vn}</b><table>${rows||'<tr><td colspan="4">無數據</td></tr>'}</table></div>`;
        gTotal+=sumMap[vn];
    });
    detailArea.innerHTML=detailHtml; summaryArea.style.display='block';
    summaryArea.innerHTML=`<b>合計</b><table>${Object.keys(sumMap).map(k=>`<tr><td>${k}</td><td>$${Math.round(sumMap[k]).toLocaleString()}</td></tr>`).join('')}<tr style="background:#ddd;font-weight:bold;"><td>總計</td><td>$${Math.round(gTotal).toLocaleString()}</td></tr></table>`;
}
function qU(d,k,v){ const data=JSON.parse(localStorage.getItem(KEY+'d_'+d)); data.vs[k]=parseFloat(v); localStorage.setItem(KEY+'d_'+d, JSON.stringify(data)); updateRecon(); }
function qD(d,k){ if(confirm('刪除?')){ const data=JSON.parse(localStorage.getItem(KEY+'d_'+d)); delete data.vs[k]; localStorage.setItem(KEY+'d_'+d, JSON.stringify(data)); updateRecon(); } }
function manualAddVendorData(){
    const vn = document.querySelector('.recon-chk:checked')?.value;
    const day = document.getElementById('addDay').value, amt = document.getElementById('addAmt').value;
    if(!vn || !day || !amt) return alert('請勾選廠商並填寫日期金額');
    const date = document.getElementById('reconMonth').value + '-' + day.padStart(2,'0');
    let data = JSON.parse(localStorage.getItem(KEY+'d_'+date)) || {vs:{}};
    data.vs[vn] = parseFloat(amt);
    localStorage.setItem(KEY+'d_'+date, JSON.stringify(data)); updateRecon();
}

// 3. 報表中心
function genFullReport(){
    const month = document.getElementById('rMonth').value;
    const m = JSON.parse(localStorage.getItem(KEY+'m_'+month));
    const c = cfg();
    if(!m) { document.getElementById('repArea').style.display='block'; document.getElementById('repArea').innerHTML = "請先完成「月結算」存檔"; return; }

    let dayRows="", tCash=0, tE=0, tDays=0, vSum={};
    for(let i=1; i<=31; i++){
        const date = month + '-' + String(i).padStart(2,'0');
        const d = JSON.parse(localStorage.getItem(KEY+'d_'+date));
        if(d){
            const val = (v)=>parseFloat(v)||0;
            const cRaw = (val(d.c1000)*1000) + (val(d.c100)*100) + (Math.max(0, val(d.w50)-26)*5) + (Math.max(0, val(d.w10)-26)*1.33) + (Math.max(0, val(d.w5)-26)*1.1) - c.petty;
            const eRaw = val(d.pOnline) + val(d.pScan);
            if(cRaw!==0 || eRaw!==0) {
                dayRows += `<tr><td>${i}</td><td>$${Math.round(cRaw).toLocaleString()}</td><td>$${val(d.pOnline)}</td><td>$${val(d.pScan)}</td><td>$${Math.round(cRaw+eRaw).toLocaleString()}</td></tr>`;
                tCash += cRaw; tE += eRaw; tDays++;
            }
            if(d.vs) for(let k in d.vs){
                const p=k.split('_'), amt = p.length===3 ? (val(d.vs[k])*parseFloat(p[2])) : val(d.vs[k]);
                vSum[p[0]] = (vSum[p[0]]||0) + amt;
            }
        }
    }

    const tVendor = Object.values(vSum).reduce((a,b)=>a+b, 0);
    const eUse = ((m.e110||c.i110)-c.i110)+((m.e220||c.i220)-c.i220)-((m.se110||c.is110)-c.is110)-((m.se220||c.is220)-c.is220);
    const fixedItems = [{n:'店面租金',v:m.rent},{n:'公攤(×0.75)',v:m.pub*0.75},{n:'設備租賃',v:m.lease},{n:`電費(${Math.round(eUse)}度)`,v:eUse*c.ue},{n:'水費',v:((m.w||c.iw)-c.iw)*c.uw},{n:'瓦斯',v:((m.g||c.ig)-c.ig)*c.ug},{n:'預估稅金',v:m.taxb*0.05}];
    const tFixed = fixedItems.reduce((a,b)=>a+(b.v||0), 0);
    const tStaff = get('staff').reduce((sum,s)=>sum + ((m.staff?.[s.n]||0)*s.r) + (m.bonus?.[s.n]||0), 0);

    document.getElementById('repArea').style.display='block';
    document.getElementById('repArea').innerHTML = `
        <h3 style="text-align:center;">Wazi ${month} 營運報表</h3>
        <div class="section-title">📅 每日營收明細</div>
        <table><tr><th>日</th><th>現金</th><th>網路</th><th>掃碼</th><th>總計</th></tr>${dayRows}</table>
        <div class="section-title">💰 營收統計</div>
        <table><tr><td>現金總收入</td><td>$${Math.round(tCash).toLocaleString()}</td></tr><tr><td>電子支付總額</td><td>$${Math.round(tE).toLocaleString()}</td></tr><tr style="background:#eee;font-weight:bold;"><td>本月總營收</td><td>$${Math.round(tCash+tE).toLocaleString()}</td></tr><tr><td>工作天 / 日均</td><td>${tDays}天 / $${Math.round((tCash+tE)/tDays).toLocaleString()}</td></tr></table>
        <div class="section-title">📦 廠商支出</div>
        <table>${Object.keys(vSum).map(vn=>`<tr><td>${vn}</td><td>$${Math.round(vSum[vn]).toLocaleString()}</td></tr>`).join('')}<tr><td style="font-weight:bold;">廠商合計</td><td style="font-weight:bold;">$${Math.round(tVendor).toLocaleString()}</td></tr></table>
        <div class="section-title">⚡ 固定與能源 (公攤已打折)</div>
        <table>${fixedItems.map(f=>`<tr><td>${f.n}</td><td>$${Math.round(f.v||0).toLocaleString()}</td></tr>`).join('')}<tr><td style="font-weight:bold;">固定合計</td><td style="font-weight:bold;">$${Math.round(tFixed).toLocaleString()}</td></tr></table>
        <div class="section-title">👥 人事成本：$${Math.round(tStaff).toLocaleString()}</div>
        <div style="font-size:24px; text-align:center; padding:20px; background:#000; color:white; border-radius:10px; margin-top:15px;">本月純利：$${Math.round(tCash+tE - tVendor - tFixed - tStaff).toLocaleString()}</div>
        <div style="font-size:10px; color:#999; margin-top:10px;">度數紀錄：總110(${m.e110})/總220(${m.e220})/分110(${m.se110})/分220(${m.se220})/水(${m.w})/瓦斯(${m.g})</div>`;
}

// 4. 月結算
function loadMonthly(){
    const m = JSON.parse(localStorage.getItem(KEY+'m_'+document.getElementById('mMonth').value))||{staff:{}, bonus:{}};
    document.getElementById('mStaffArea').innerHTML = get('staff').map(s=>`<div class="card"><b>${s.n}</b><div class="grid"><div class="form-group"><label>工時</label><input type="number" class="ms-qty" data-n="${s.n}" value="${m.staff?.[s.n]||''}"></div><div class="form-group"><label>獎金</label><input type="number" class="ms-bonus" data-n="${s.n}" value="${m.bonus?.[s.n]||''}"></div></div></div>`).join('');
    ['e110','e220','se110','se220','w','g','pub','rent','taxb','lease'].forEach(k=>document.getElementById('m'+k).value=m[k]||'');
}
function saveMonthlyAndGo(){
    const m = document.getElementById('mMonth').value, s={}, b={};
    document.querySelectorAll('.ms-qty').forEach(i=>s[i.dataset.n]=parseFloat(i.value)||0);
    document.querySelectorAll('.ms-bonus').forEach(i=>b[i.dataset.n]=parseFloat(i.value)||0);
    set('m_'+m, { staff:s, bonus:b, e110:parseFloat(document.getElementById('me110').value)||0, e220:parseFloat(document.getElementById('me220').value)||0, se110:parseFloat(document.getElementById('mse110').value)||0, se220:parseFloat(document.getElementById('mse220').value)||0, w:parseFloat(document.getElementById('mw').value)||0, g:parseFloat(document.getElementById('mg').value)||0, pub:parseFloat(document.getElementById('mpub').value)||0, rent:parseFloat(document.getElementById('mrent').value)||0, taxb:parseFloat(document.getElementById('mtaxb').value)||0, lease:parseFloat(document.getElementById('mlease').value)||0 });
    document.getElementById('rMonth').value = m; switchTab('report');
}

// 5. 系統設定
function renderSettings(){
    const c = cfg();
    ['upElec','upWater','upGas','sPetty','si110','si220','sis110','sis220','siw','sig'].forEach(id=>{
        const map = {upElec:'ue', upWater:'uw', upGas:'ug', sPetty:'petty', si110:'i110', si220:'i220', sis110:'is110', sis220:'is220', siw:'iw', sig:'ig'};
        document.getElementById(id).value = c[map[id]];
    });
    document.getElementById('listStaff').innerHTML = get('staff').map((s,i)=>`<div>${s.n} ($${s.r}) <button class="btn-danger" onclick="del('staff',${i})">刪</button></div>`).join('');
    document.getElementById('listVendor').innerHTML = get('vendors').map((v,i)=>`
        <div class="card" style="border:1px solid #ddd;">
            <b>${v.name} (${v.type})</b> <button class="btn-danger" onclick="del('vendors',${i})">刪除廠商</button>
            ${v.type==='品項' ? `
                <div style="margin-top:10px;">
                    <input id="itn${i}" placeholder="品項名" style="width:80px;">
                    <input id="itp${i}" placeholder="單價" style="width:60px;">
                    <button class="btn-primary" style="padding:4px;" onclick="addItem(${i})">新增品項</button>
                </div>
                <div style="font-size:11px; color:#666; margin-top:5px;">
                    ${(v.items||[]).map((it,ii)=>`<span>${it.n}($${it.p}) <button onclick="delItem(${i},${ii})" style="border:none; background:none; color:red; cursor:pointer;">x</button></span>`).join(' | ')}
                </div>
            ` : ''}
        </div>
    `).join('');
}
function saveSettings(){
    const c = { ue:parseFloat(document.getElementById('upElec').value)||0, uw:parseFloat(document.getElementById('upWater').value)||0, ug:parseFloat(document.getElementById('upGas').value)||0, petty:parseFloat(document.getElementById('sPetty').value)||0, i110:parseFloat(document.getElementById('si110').value)||0, i220:parseFloat(document.getElementById('si220').value)||0, is110:parseFloat(document.getElementById('sis110').value)||0, is220:parseFloat(document.getElementById('sis220').value)||0, iw:parseFloat(document.getElementById('siw').value)||0, ig:parseFloat(document.getElementById('sig').value)||0 };
    set('cfg', c); alert('設定儲存成功');
}
function addStaff(){ const n=prompt('姓名'); if(n) { const s=get('staff'); s.push({n:n, r:parseFloat(prompt('時薪','190'))}); set('staff',s); renderSettings(); } }
function addVendor(){ const n=prompt('廠商名'); if(n) { const t=confirm('按品項數量輸入？(選確定)；按金額輸入？(選取消)')?'品項':'金額'; const v=get('vendors'); v.push({name:n, type:t, items:[]}); set('vendors',v); renderSettings(); } }
function addItem(vi){ const v=get('vendors'), n=document.getElementById('itn'+vi).value, p=parseFloat(document.getElementById('itp'+vi).value); if(n&&p){ v[vi].items.push({n:n,p:p}); set('vendors',v); renderSettings(); } }
function delItem(vi,ii){ const v=get('vendors'); v[vi].items.splice(ii,1); set('vendors',v); renderSettings(); }
function del(k,i){ const d=get(k); d.splice(i,1); set(k,d); renderSettings(); }
async function exportPDF(){ const c=await html2canvas(document.getElementById('repArea')); const p=new jspdf.jsPDF(); p.addImage(c.toDataURL('image/png'),'PNG',10,10,190,0); p.save(`Wazi_Report.pdf`); }
function backupData(){ const d={}; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k.includes(KEY)) d[k]=localStorage.getItem(k); } const b=new Blob([JSON.stringify(d)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`Wazi_Backup.json`; a.click(); }
function clearAllData(){ if(confirm('清空營運數據?')){ for(let i=localStorage.length-1;i>=0;i--){ const k=localStorage.key(i); if(k.includes('d_')||k.includes('m_')) localStorage.removeItem(k); } location.reload(); } }
</script>
