<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wazi 旗艦管理系統 14.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #f4f7f6; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .tabs { display: grid; grid-template-columns: repeat(6, 1fr); gap: 3px; margin-bottom: 12px; }
        .tab-btn { padding: 10px 2px; background: #e0e0e0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 11px; }
        .tab-btn.active { background: #764ba2; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 11px; color: #777; margin-bottom: 4px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-success { background: #28a745; color: white; }
        .btn-primary { background: #007bff; color: white; }
        .btn-danger { background: #dc3545; color: white; padding: 5px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        table th, table td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .section-title { border-left: 4px solid #764ba2; padding-left: 8px; margin: 15px 0 10px; font-size: 15px; font-weight: bold; background: #f9f0ff; padding: 5px; }
        .vendor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .vendor-card { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 8px; }
        .price-tag { color: #d63384; font-size: 10px; font-weight: bold; display: block; margin-top: 2px; }
        .reconcile-layout { display: grid; grid-template-columns: 120px 1fr; gap: 15px; }
        .check-item { margin-bottom: 10px; font-size: 14px; display: flex; align-items: center; }
        .check-item input { margin-right: 8px; width: 18px; height: 18px; }
        .edit-input { width: 80px !important; padding: 4px !important; font-size: 12px !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('daily')">每日記帳</button>
        <button class="tab-btn" onclick="switchTab('recon')">對帳中心</button>
        <button class="tab-btn" onclick="switchTab('report')">報表中心</button>
        <button class="tab-btn" onclick="switchTab('monthly')">月結算</button>
        <button class="tab-btn" onclick="switchTab('settings')">系統設定</button>
        <button class="tab-btn" onclick="switchTab('data')">資料管理</button>
    </div>

    <div id="daily" class="tab-content active">
        <div class="card"><input type="date" id="logDate" onchange="loadDaily()" style="width:100%; border:none; font-size:18px; font-weight:bold; text-align:center;"></div>
        <div class="card">
            <h4 style="margin:0 0 10px;">💰 今日收銀</h4>
            <div class="grid">
                <div class="form-group"><label>千元(張)</label><input type="number" id="c1000" oninput="calcDaily()"></div>
                <div class="form-group"><label>百元(張)</label><input type="number" id="c100" oninput="calcDaily()"></div>
            </div>
            <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
                <div class="form-group"><label>$50重量</label><input type="number" id="w50" oninput="calcDaily()"></div>
                <div class="form-group"><label>$10重量</label><input type="number" id="w10" oninput="calcDaily()"></div>
                <div class="form-group"><label>$5重量</label><input type="number" id="w5" oninput="calcDaily()"></div>
            </div>
            <div class="grid">
                <div class="form-group"><label>網路收入</label><input type="number" id="pOnline" oninput="calcDaily()"></div>
                <div class="form-group"><label>掃碼支付</label><input type="number" id="pScan" oninput="calcDaily()"></div>
            </div>
            <div style="text-align:right; font-size:15px; font-weight:bold; color:#764ba2;">今日營業額: <span id="cSumDisplay">$0</span></div>
        </div>
        <h4 class="section-title">📦 廠商進貨</h4>
        <div id="vDailyArea" class="vendor-grid"></div>
        <button class="btn btn-success" onclick="saveDaily()">✅ 儲存今日數據</button>
    </div>

    <div id="recon" class="tab-content">
        <div class="card">
            <input type="month" id="reconMonth" onchange="renderRecon()" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
        </div>
        <div class="reconcile-layout">
            <div class="card" style="padding:10px;">
                <div style="font-weight:bold; margin-bottom:10px; font-size:12px; border-bottom:1px solid #eee;">選擇廠商</div>
                <div id="reconVendorList"></div>
            </div>
            <div id="reconDetailArea">
                <div class="card">請勾選左側廠商進行對帳</div>
            </div>
        </div>
        <div id="reconSummaryArea" class="card" style="display:none; background:#f9f9f9;"></div>
    </div>

    <div id="report" class="tab-content">
        <div class="card"><input type="month" id="rMonth" onchange="genFullReport()"></div>
        <div id="repArea" style="background:white; padding:15px; border:1px solid #ccc; display:none; overflow-x:auto;"></div>
        <button class="btn btn-primary" style="margin-top:10px;" onclick="exportPDF()">📥 輸出 PDF 報表</button>
    </div>

    <div id="monthly" class="tab-content">
        <div class="card"><input type="month" id="mMonth" onchange="loadMonthly()"></div>
        <div class="card">
            <h4 style="margin:0 0 10px;">營運支出錄入</h4>
            <div class="grid">
                <div class="form-group"><label>總表 110V</label><input type="number" id="me110"></div>
                <div class="form-group"><label>總表 220V</label><input type="number" id="me220"></div>
                <div class="form-group"><label>分表 110V</label><input type="number" id="mse110"></div>
                <div class="form-group"><label>分表 220V</label><input type="number" id="mse220"></div>
                <div class="form-group"><label>水費 收尾</label><input type="number" id="mw"></div>
                <div class="form-group"><label>瓦斯 收尾</label><input type="number" id="mg"></div>
                <div class="form-group"><label>租金</label><input type="number" id="mrent"></div>
                <div class="form-group"><label>公攤費</label><input type="number" id="mpub"></div>
                <div class="form-group"><label>設備租賃</label><input type="number" id="mlease"></div>
                <div class="form-group"><label>稅金基數</label><input type="number" id="mtaxb"></div>
            </div>
            <h4 class="section-title">👥 人事薪資 (工時與獎金)</h4>
            <div id="mStaffArea"></div>
            <button class="btn btn-success" onclick="saveMonthlyAndGo()">🚀 送出並產生報表</button>
        </div>
    </div>

    <div id="settings" class="tab-content">
        <div class="section-title">⚡ 能源單價與起始值</div>
        <div class="card">
            <div class="grid">
                <div class="form-group"><label>電單價</label><input type="number" id="upElec"></div>
                <div class="form-group"><label>水單價</label><input type="number" id="upWater"></div>
                <div class="form-group"><label>瓦斯單價</label><input type="number" id="upGas"></div>
                <div class="form-group"><label>零用金</label><input type="number" id="sPetty"></div>
            </div>
            <div class="grid">
                <div class="form-group"><label>總110起</label><input type="number" id="si110"></div>
                <div class="form-group"><label>總220起</label><input type="number" id="si220"></div>
                <div class="form-group"><label>分110起</label><input type="number" id="sis110"></div>
                <div class="form-group"><label>分220起</label><input type="number" id="sis220"></div>
                <div class="form-group"><label>水起始</label><input type="number" id="siw"></div>
                <div class="form-group"><label>瓦斯起始</label><input type="number" id="sig"></div>
            </div>
        </div>
        <div class="section-title">👥 人事與廠商管理</div>
        <div class="card">
            <div id="listStaff"></div><button class="btn btn-primary" onclick="addStaff()">+ 新增員工</button>
            <hr>
            <div id="listVendor"></div><button class="btn btn-primary" onclick="addVendor()">+ 新增廠商</button>
        </div>
        <button class="btn btn-success" onclick="saveSettings()">💾 儲存所有設定</button>
    </div>

    <div id="data" class="tab-content">
        <div class="card">
            <button class="btn btn-primary" onclick="backupData()">📥 備份所有資料</button>
            <div style="margin-top:15px;">
                <label>匯入備份檔：</label>
                <input type="file" id="importFile" onchange="importData()">
            </div>
            <hr>
            <button class="btn btn-danger" onclick="clearAllData()">⚠️ 清空營運數據</button>
        </div>
    </div>
</div>

<script>
// --- 資料核心 ---
const KEY = "w14_";
const get = (k)=>JSON.parse(localStorage.getItem(KEY+k)) || [];
const set = (k,v)=>localStorage.setItem(KEY+k, JSON.stringify(v));
const cfg = ()=>JSON.parse(localStorage.getItem(KEY+'cfg')) || {petty:8000, fee:2.4, i110:0, i220:0, is110:0, is220:0, iw:0, ig:0, ue:5, uw:12, ug:20};

// --- 初始化 ---
document.getElementById('logDate').valueAsDate = new Date();
const currentMonth = new Date().toISOString().slice(0, 7);
['rMonth','mMonth','reconMonth'].forEach(id=>document.getElementById(id).value = currentMonth);

function switchTab(id){
    document.querySelectorAll('.tab-content, .tab-btn').forEach(el=>el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    const targetBtn = document.querySelector(`.tab-btn[onclick*="${id}"]`);
    if(targetBtn) targetBtn.classList.add('active');
    if(id==='daily') loadDaily();
    if(id==='recon') renderRecon();
    if(id==='report') genFullReport();
    if(id==='monthly') loadMonthly();
    if(id==='settings') renderSettings();
}

// --- 每日記帳 ---
function calcDaily(){
    const c = cfg();
    const val = (id)=>parseFloat(document.getElementById(id).value) || 0;
    const cashTotal = (val('c1000')*1000) + (val('c100')*100) + (Math.max(0, val('w50')-26)*5) + (Math.max(0, val('w10')-26)*1.33) + (Math.max(0, val('w5')-26)*1.1);
    const rev = (cashTotal - c.petty) + val('pOnline') + val('pScan');
    document.getElementById('cSumDisplay').innerText = `$ ${Math.round(rev).toLocaleString()}`;
}

function updateVSub(vName, n, p, qtyInput){
    const qty = parseFloat(qtyInput.value) || 0;
    const el = document.getElementById(`sub_${vName}_${n}`);
    if(el) el.innerText = `$ ${Math.round(qty * p).toLocaleString()}`;
}

function loadDaily(){
    const date = document.getElementById('logDate').value;
    const d = JSON.parse(localStorage.getItem('d_'+date)) || {vs:{}};
    ['c1000','c100','w50','w10','w5','pOnline','pScan'].forEach(f=>document.getElementById(f).value=d[f]||'');
    const vendors = get('vendors');
    document.getElementById('vDailyArea').innerHTML = vendors.map(v => {
        let inputHtml = '';
        if(v.type === '金額'){
            inputHtml = `<input type="number" class="vd-input" data-name="${v.name}" value="${d.vs[v.name]||''}">`;
        } else {
            inputHtml = (v.items||[]).map(it => {
                const key = v.name+'_'+it.n+'_'+it.p;
                const savedVal = d.vs[key] || 0;
                return `
                <div style="font-size:10px; margin-top:5px;">${it.n}($${it.p})</div>
                <input type="number" step="any" class="vit-qty" data-v="${v.name}" data-n="${it.n}" data-p="${it.p}" oninput="updateVSub('${v.name}','${it.n}',${it.p}, this)" value="${d.vs[key]||''}">
                <span class="price-tag" id="sub_${v.name}_${it.n}">$ ${Math.round(savedVal*it.p).toLocaleString()}</span>`;
            }).join('');
        }
        return `<div class="vendor-card"><label style="font-size:12px;font-weight:bold;">${v.name}</label>${inputHtml}</div>`;
    }).join('');
    calcDaily();
}

function saveDaily(){
    const date = document.getElementById('logDate').value;
    const vs = {};
    document.querySelectorAll('.vd-input').forEach(i => vs[i.dataset.name] = parseFloat(i.value)||0);
    document.querySelectorAll('.vit-qty').forEach(i => {
        const key = i.dataset.v + '_' + i.dataset.n + '_' + i.dataset.p;
        vs[key] = parseFloat(i.value)||0;
    });
    const data = { c1000:document.getElementById('c1000').value, c100:document.getElementById('c100').value, w50:document.getElementById('w50').value, w10:document.getElementById('w10').value, w5:document.getElementById('w5').value, pOnline:document.getElementById('pOnline').value, pScan:document.getElementById('pScan').value, vs: vs };
    localStorage.setItem('d_'+date, JSON.stringify(data)); alert('記帳成功');
}

// --- 對帳中心 (核心邏輯) ---
function renderRecon(){
    const vendors = get('vendors');
    document.getElementById('reconVendorList').innerHTML = vendors.map(v=>`
        <div class="check-item"><input type="checkbox" class="recon-chk" value="${v.name}" onchange="updateReconDetails()"> ${v.name}</div>
    `).join('');
    updateReconDetails();
}

function updateReconDetails(){
    const month = document.getElementById('reconMonth').value;
    const selected = Array.from(document.querySelectorAll('.recon-chk:checked')).map(el=>el.value);
    const detailArea = document.getElementById('reconDetailArea');
    const summaryArea = document.getElementById('reconSummaryArea');
    
    if(selected.length === 0){
        detailArea.innerHTML = '<div class="card">請勾選左側廠商進行對帳</div>';
        summaryArea.style.display = 'none';
        return;
    }

    let detailHtml = "", summaryMap = {}, grandTotal = 0;

    selected.forEach(vName => {
        summaryMap[vName] = 0;
        let vRows = "";
        for(let i=1; i<=31; i++){
            const date = month + '-' + String(i).padStart(2,'0');
            const d = JSON.parse(localStorage.getItem('d_'+date));
            if(d && d.vs){
                for(let key in d.vs){
                    if(key.startsWith(vName)){
                        const val = parseFloat(d.vs[key]) || 0;
                        const parts = key.split('_');
                        const isQty = parts.length === 3;
                        const amount = isQty ? (val * parseFloat(parts[2])) : val;
                        if(val > 0){
                            vRows += `
                            <tr>
                                <td>${i}號</td>
                                <td>${isQty ? parts[1] : '總額'}</td>
                                <td><input type="number" class="edit-input" value="${val}" onchange="quickUpdate('${date}','${key}',this.value)"> ${isQty ? '單位' : ''}</td>
                                <td>$${Math.round(amount).toLocaleString()}</td>
                            </tr>`;
                            summaryMap[vName] += amount;
                        }
                    }
                }
            }
        }
        detailHtml += `
            <div class="card">
                <h4 style="margin:0 0 5px; color:#764ba2;">${vName} 進貨清單</h4>
                <table><tr><th>日期</th><th>品項</th><th>數量/金額</th><th>小計</th></tr>${vRows || '<tr><td colspan="4">本月無數據</td></tr>'}</table>
            </div>`;
        grandTotal += summaryMap[vName];
    });

    detailArea.innerHTML = detailHtml;
    summaryArea.style.display = 'block';
    summaryArea.innerHTML = `
        <h4 style="margin:0 0 10px; border-bottom:1px solid #ddd;">📊 選取廠商彙總</h4>
        <table>
            <tr><th>廠商名稱</th><th>本月進貨總額</th></tr>
            ${Object.keys(summaryMap).map(k=>`<tr><td>${k}</td><td>$${Math.round(summaryMap[k]).toLocaleString()}</td></tr>`).join('')}
            <tr style="background:#eee; font-weight:bold;"><td>勾選總計</td><td>$${Math.round(grandTotal).toLocaleString()}</td></tr>
        </table>`;
}

function quickUpdate(date, key, newVal){
    const d = JSON.parse(localStorage.getItem('d_'+date));
    if(d && d.vs){
        d.vs[key] = parseFloat(newVal) || 0;
        localStorage.setItem('d_'+date, JSON.stringify(d));
        updateReconDetails();
    }
}

// --- 月結算 (含獎金) ---
function loadMonthly(){
    const month = document.getElementById('mMonth').value;
    const m = JSON.parse(localStorage.getItem('m_'+month))||{staff:{}, bonus:{}};
    document.getElementById('mStaffArea').innerHTML = get('staff').map(s=>`
        <div class="card" style="padding:10px; margin-bottom:5px;">
            <div style="font-weight:bold; font-size:14px; margin-bottom:5px;">${s.n} (時薪 $${s.r})</div>
            <div class="grid">
                <div class="form-group"><label>總工時</label><input type="number" class="ms-qty" data-n="${s.n}" value="${m.staff?.[s.n]||''}"></div>
                <div class="form-group"><label>獎金</label><input type="number" class="ms-bonus" data-n="${s.n}" value="${m.bonus?.[s.n]||''}"></div>
            </div>
        </div>
    `).join('');
    ['e110','e220','se110','se220','w','g','pub','rent','taxb','lease'].forEach(k=>document.getElementById('m'+k).value=m[k]||'');
}

function saveMonthlyAndGo(){
    const month = document.getElementById('mMonth').value;
    const sMap = {}, bMap = {};
    document.querySelectorAll('.ms-qty').forEach(i=>sMap[i.dataset.n]=parseFloat(i.value)||0);
    document.querySelectorAll('.ms-bonus').forEach(i=>bMap[i.dataset.n]=parseFloat(i.value)||0);
    const data = { staff: sMap, bonus: bMap, e110: parseFloat(document.getElementById('me110').value)||0, e220: parseFloat(document.getElementById('me220').value)||0, se110: parseFloat(document.getElementById('mse110').value)||0, se220: parseFloat(document.getElementById('mse220').value)||0, w: parseFloat(document.getElementById('mw').value)||0, g: parseFloat(document.getElementById('mg').value)||0, pub: parseFloat(document.getElementById('mpub').value)||0, rent: parseFloat(document.getElementById('mrent').value)||0, taxb: parseFloat(document.getElementById('mtaxb').value)||0, lease: parseFloat(document.getElementById('mlease').value)||0 };
    localStorage.setItem('m_'+month, JSON.stringify(data));
    document.getElementById('rMonth').value = month;
    switchTab('report');
}

// --- 報表中心邏輯 ---
function genFullReport(){
    const month = document.getElementById('rMonth').value;
    const m = JSON.parse(localStorage.getItem('m_'+month)) || {staff:{}, bonus:{}};
    const c = cfg();
    let dailyRows = "", tCashAll = 0, tPayAll = 0, tDays = 0, vTotals = {};

    for(let i=1; i<=31; i++){
        const dateStr = month + '-' + String(i).padStart(2,'0');
        const d = JSON.parse(localStorage.getItem('d_'+dateStr));
        if(d){
            const val = (v)=>parseFloat(v)||0;
            const cash = (val(d.c1000)*1000) + (val(d.c100)*100) + (Math.max(0, val(d.w50)-26)*5) + (Math.max(0, val(d.w10)-26)*1.33) + (Math.max(0, val(d.w5)-26)*1.1) - c.petty;
            const pay = val(d.pOnline) + val(d.pScan);
            tCashAll += cash; tPayAll += pay; tDays++;
            dailyRows += `<tr><td>${i}號</td><td>$${Math.round(cash).toLocaleString()}</td><td>$${Math.round(pay).toLocaleString()}</td><td>$${Math.round(cash+pay).toLocaleString()}</td></tr>`;
            if(d.vs) for(let key in d.vs){
                const parts = key.split('_');
                const vName = parts[0];
                const amount = parts.length === 3 ? (val(d.vs[key]) * val(parts[2])) : val(d.vs[key]);
                vTotals[vName] = (vTotals[vName]||0) + amount;
            }
        }
    }

    if(tDays === 0) { document.getElementById('repArea').innerHTML = "本月無數據"; return; }

    const tRev = tCashAll + tPayAll;
    const tVendor = Object.values(vTotals).reduce((a,b)=>a+b,0);
    const tax = (m.taxb||0) * 0.05;
    const tFixed = (((m.e110||c.i110)-c.i110)+((m.e220||c.i220)-c.i220)-((m.se110||c.is110)-c.is110)-((m.se220||c.is220)-c.is220))*c.ue + (((m.w||c.iw)-c.iw)*c.uw) + (((m.g||c.ig)-c.ig)*c.ug) + (m.rent||0) + (m.pub||0) + (m.lease||0) + tax;
    const tStaff = get('staff').reduce((sum,s)=>sum + ((m.staff?.[s.n]||0)*s.r) + (m.bonus?.[s.n]||0), 0);

    const rep = document.getElementById('repArea');
    rep.style.display = 'block';
    rep.innerHTML = `
        <h3 style="text-align:center;">Wazi ${month} 營運報表</h3>
        <div class="section-title">💰 營收總結</div>
        <table>
            <tr style="background:#eee;"><th>總營業額 / 均日</th><th>$${Math.round(tRev).toLocaleString()} / $${Math.round(tRev/tDays).toLocaleString()}</th></tr>
        </table>
        <div class="section-title">📦 廠商總支出：$${Math.round(tVendor).toLocaleString()}</div>
        <div class="section-title">⚡ 固定與能源支出：$${Math.round(tFixed).toLocaleString()}</div>
        <div class="section-title">👥 人事總支出 (含獎金)：$${Math.round(tStaff).toLocaleString()}</div>
        <div style="font-size:24px; text-align:center; padding:20px; background:#000; color:white; border-radius:10px; margin-top:15px;">
            本月淨利：$${Math.round(tRev - tVendor - tFixed - tStaff).toLocaleString()}
        </div>
        <p style="font-size:10px; color:#999; margin-top:10px;">*註：細節對帳請至「對帳中心」查詢</p>
    `;
}

// --- 設定與管理 (同 13.0 邏輯) ---
function renderSettings(){
    const c = cfg();
    const map = {upElec:c.ue, upWater:c.uw, upGas:c.ug, sPetty:c.petty, si110:c.i110, si220:c.i220, sis110:c.is110, sis220:c.is220, siw:c.iw, sig:c.ig};
    for(let id in map) if(document.getElementById(id)) document.getElementById(id).value = map[id];
    document.getElementById('listStaff').innerHTML = get('staff').map((s,i)=>`<div style="margin-bottom:5px;">${s.n} ($${s.r}) <button class="btn-danger" onclick="del('staff',${i})">刪除</button></div>`).join('');
    document.getElementById('listVendor').innerHTML = get('vendors').map((v,i)=>`
        <div class="card" style="border:1px solid #ddd;"><b>${v.name}</b> (${v.type}) <button class="btn-danger" onclick="del('vendors',${i})">刪除</button>
        ${v.type==='品項' ? `<div><input id="itn${i}" placeholder="品名" style="width:40%"><input id="itp${i}" placeholder="單價" style="width:30%"><button onclick="addItem(${i})">+加</button></div><div id="vitms${i}">${(v.items||[]).map((it,ii)=>`<div style="font-size:11px;">${it.n}($${it.p}) <span style="color:red;" onclick="delItem(${i},${ii})">[x]</span></div>`).join('')}</div>` : ''}</div>
    `).join('');
}
function saveSettings(){ const c = cfg(); c.ue=parseFloat(document.getElementById('upElec').value); c.uw=parseFloat(document.getElementById('upWater').value); c.ug=parseFloat(document.getElementById('upGas').value); c.petty=parseFloat(document.getElementById('sPetty').value); c.i110=parseFloat(document.getElementById('si110').value); c.i220=parseFloat(document.getElementById('si220').value); c.is110=parseFloat(document.getElementById('sis110').value); c.is220=parseFloat(document.getElementById('sis220').value); c.iw=parseFloat(document.getElementById('siw').value); c.ig=parseFloat(document.getElementById('sig').value); set('cfg', c); alert('儲存成功'); }
function addStaff(){ const name = prompt('姓名'); if(name){ const s=get('staff'); s.push({n:name, r:parseFloat(prompt('時薪','190'))}); set('staff',s); renderSettings(); } }
function addVendor(){ const name = prompt('廠商名'); if(name){ const type = confirm('品項單價輸入?') ? '品項' : '金額'; const v=get('vendors'); v.push({name:name, type:type, items:[]}); set('vendors',v); renderSettings(); } }
function addItem(vi){ const v=get('vendors'); const n=document.getElementById('itn'+vi).value, p=parseFloat(document.getElementById('itp'+vi).value); if(n&&p){ v[vi].items.push({n:n,p:p}); set('vendors',v); renderSettings(); } }
function del(k,i){ const d=get(k); d.splice(i,1); set(k,d); renderSettings(); }
function delItem(vi,ii){ const v=get('vendors'); v[vi].items.splice(ii,1); set('vendors',v); renderSettings(); }
function backupData(){ const data={}; for(let i=0; i<localStorage.length; i++){ const k=localStorage.key(i); if(k.includes(KEY)||k.includes('d_')||k.includes('m_')) data[k]=localStorage.getItem(k); } const blob=new Blob([JSON.stringify(data)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`Wazi_Backup.json`; a.click(); }
function importData(){ const file=document.getElementById('importFile').files[0]; if(!file)return; const r=new FileReader(); r.onload=(e)=>{ const d=JSON.parse(e.target.result); localStorage.clear(); for(let k in d)localStorage.setItem(k,d[k]); location.reload(); }; r.readAsText(file); }
function clearAllData(){ if(confirm('清空營運數據?')){ for(let i=localStorage.length-1;i>=0;i--){ const k=localStorage.key(i); if(k.startsWith('d_')||k.startsWith('m_')) localStorage.removeItem(k); } location.reload(); } }
async function exportPDF(){ const c=await html2canvas(document.getElementById('repArea')); const p=new jspdf.jsPDF(); p.addImage(c.toDataURL('image/png'),'PNG',10,10,190,0); p.save(`Wazi_${document.getElementById('rMonth').value}.pdf`); }
</script>
</body>
